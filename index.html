<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
  #canvas { display: block; cursor: crosshair; }
  
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 24px;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    pointer-events: none;
    z-index: 10;
  }
  
  .stat-box {
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,220,50,0.8);
    border-radius: 6px;
    padding: 8px 16px;
    text-align: center;
    min-width: 120px;
  }
  
  .stat-label {
    color: rgba(255,220,50,0.7);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  
  .stat-value {
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    line-height: 1.1;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
  }
  
  #progress-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 6px;
    background: rgba(255,255,255,0.1);
    z-index: 10;
  }
  
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6b35, #ffcc02);
    transition: width 0.3s ease;
    width: 0%;
  }
  
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    pointer-events: none;
    z-index: 10;
  }
  
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,80,80,0.9);
    border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 20px; top: 10px; left: 19px; }
  #crosshair::after { width: 20px; height: 2px; top: 19px; left: 10px; }
  
  .crosshair-dot {
    position: absolute;
    width: 6px; height: 6px;
    background: rgba(255,80,80,0.9);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  #hit-flash {
    position: fixed; inset: 0;
    background: rgba(255, 255, 100, 0.3);
    pointer-events: none;
    opacity: 0;
    z-index: 9;
    transition: opacity 0.05s;
  }

  /* ── MENU OVERLAY ─────────────────────────────────────────── */
  #screen-overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: stretch; justify-content: stretch;
    z-index: 20;
    overflow: hidden;
  }

  /* Layered background */
  #overlay-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(255,140,0,0.08) 0%, transparent 70%),
      linear-gradient(160deg, #0a0c0f 0%, #0d1117 40%, #0a0e08 100%);
  }

  /* Animated grid lines */
  #overlay-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,200,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,200,0,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: grid-drift 20s linear infinite;
  }
  @keyframes grid-drift {
    from { background-position: 0 0; }
    to   { background-position: 60px 60px; }
  }

  /* Vignette */
  #overlay-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
  }

  /* Scanlines */
  #overlay-scan {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* Content wrapper */
  #overlay-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: row;
    flex: 1;
    animation: content-rise 0.9s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes content-rise {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top badge */
  .menu-badge {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 6px;
    color: rgba(255,200,0,0.7);
    text-transform: uppercase;
    border: 1px solid rgba(255,200,0,0.25);
    padding: 5px 18px;
    border-radius: 20px;
    margin-bottom: 28px;
    background: rgba(255,200,0,0.05);
    backdrop-filter: blur(4px);
  }

  /* Main title */
  .menu-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 12vw, 130px);
    letter-spacing: 12px;
    line-height: 0.9;
    color: #fff;
    text-shadow:
      0 0 60px rgba(255,180,0,0.4),
      0 0 120px rgba(255,100,0,0.2);
    margin-bottom: 6px;
  }
  .menu-title span {
    color: #ffcc02;
    text-shadow:
      0 0 40px rgba(255,200,0,0.8),
      0 0 80px rgba(255,150,0,0.4);
  }

  /* Subtitle line */
  .menu-sub {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 10px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 52px;
  }

  /* Stats row */
  .menu-stats {
    display: flex;
    gap: 1px;
    margin-bottom: 52px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
  }
  .menu-stat {
    padding: 14px 28px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .menu-stat:last-child { border-right: none; }
  .menu-stat-icon { font-size: 20px; margin-bottom: 4px; }
  .menu-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #ffcc02;
    letter-spacing: 2px;
    line-height: 1;
  }
  .menu-stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* Controls grid */
  .menu-controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 48px;
    width: 480px;
  }
  .ctrl-key {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .ctrl-key kbd {
    background: rgba(255,200,0,0.12);
    border: 1px solid rgba(255,200,0,0.3);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #ffcc02;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* CTA Button */
  .menu-cta {
    position: relative;
    background: #ffcc02;
    color: #0a0c0f;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 8px;
    padding: 16px 64px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
  }
  .menu-cta::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
  }
  .menu-cta::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.4s ease;
  }
  .menu-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,200,0,0.4); }
  .menu-cta:hover::after { left: 160%; }
  .menu-cta:active { transform: translateY(0); }

  /* Version tag */
  .menu-version {
    margin-top: 20px;
    font-size: 9px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
  }

  /* ── END SCREEN ─────────────────────────────────────────────── */
  .end-badge {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    border: 1px solid;
    padding: 5px 18px;
    border-radius: 20px;
    margin-bottom: 24px;
    backdrop-filter: blur(4px);
  }
  .end-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 10vw, 110px);
    letter-spacing: 10px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .end-sub {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 44px;
  }
  .end-results {
    display: flex;
    gap: 1px;
    margin-bottom: 44px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
  }
  .end-result {
    padding: 18px 32px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  .end-result:last-child { border-right: none; }
  .end-result-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .end-result-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── SHARED ─────────────────────────────────────────────────── */
  .btn {
    background: none;
    border: 2px solid currentColor;
    color: #ffcc02;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 6px;
    padding: 14px 48px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 4px;
  }
  .btn:hover { background: #ffcc02; color: #000; }

  #kill-msg {
    position: fixed;
    bottom: 28px;
    left: 28px;
    font-size: 22px;
    font-weight: 700;
    color: #ff6b35;
    text-shadow: 0 0 10px #ff6b35;
    pointer-events: none;
    opacity: 0;
    z-index: 15;
    letter-spacing: 2px;
    white-space: nowrap;
    transition: opacity 0.1s, transform 0.1s;
    font-family: 'Bebas Neue', sans-serif;
  }

  #ammo-display {
    display: flex; gap: 4px; align-items: center;
    justify-content: center; margin-top: 4px;
  }
  .ammo-pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ffcc02;
    transition: all 0.1s;
  }
  .ammo-pip.empty {
    background: rgba(255,204,2,0.2);
    border: 1px solid rgba(255,204,2,0.3);
  }

  #timer-box { transition: border-color 0.3s, background 0.3s; }
  #timer-box.warning {
    border-color: rgba(255, 100, 50, 0.9);
    background: rgba(80, 0, 0, 0.7);
    animation: timer-pulse 0.5s infinite alternate;
  }
  @keyframes timer-pulse {
    from { box-shadow: 0 0 0px rgba(255,60,60,0); }
    to   { box-shadow: 0 0 18px rgba(255,60,60,0.8); }
  }
  #timer-display.warning { color: #ff4444; }

  #time-up-flash {
    position: fixed; inset: 0;
    background: rgba(255, 0, 0, 0.25);
    pointer-events: none;
    opacity: 0;
    z-index: 9;
  }

  /* ── PAUSE MENU ─────────────────────────────────────────────── */
  #pause-overlay {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    z-index: 30;
    text-align: center;
  }

  #pause-bg {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  #pause-panel {
    position: relative; z-index: 2;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(10,12,15,0.9);
    padding: 48px 56px;
    width: 380px;
    animation: pause-pop 0.25s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes pause-pop {
    from { opacity: 0; transform: scale(0.92) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  #pause-panel .pause-indicator {
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .pause-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ffcc02;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0.2; }
  }

  #pause-panel h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    letter-spacing: 10px;
    color: #fff;
    line-height: 1;
    margin-bottom: 6px;
  }

  #pause-panel .pause-sub {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .pause-stats {
    display: flex;
    justify-content: center;
    gap: 1px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 7px;
    overflow: hidden;
    background: rgba(255,255,255,0.02);
    margin-bottom: 36px;
  }
  .pause-stat {
    flex: 1;
    padding: 12px 8px;
    border-right: 1px solid rgba(255,255,255,0.07);
  }
  .pause-stat:last-child { border-right: none; }
  .pause-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: #ffcc02;
    letter-spacing: 1px;
    line-height: 1;
  }
  .pause-stat-lbl {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .pause-btns {
    display: flex; flex-direction: column; gap: 10px;
  }

  .pause-btn {
    width: 100%;
    padding: 13px;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 5px;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
  }

  .pause-btn-primary {
    background: #ffcc02;
    color: #0a0c0f;
    border: none;
  }
  .pause-btn-primary:hover {
    background: #ffe040;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(255,200,0,0.3);
  }

  .pause-btn-secondary {
    background: transparent;
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .pause-btn-secondary:hover {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.8);
    border-color: rgba(255,255,255,0.25);
  }

  .pause-btn-danger {
    background: transparent;
    color: rgba(255,80,80,0.6);
    border: 1px solid rgba(255,80,80,0.15);
  }
  .pause-btn-danger:hover {
    background: rgba(255,60,60,0.08);
    color: rgba(255,100,100,0.9);
    border-color: rgba(255,80,80,0.35);
  }

  .pause-hint {
    margin-top: 20px;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
  }

  /* ── COOP HUD ───────────────────────────────────────────────── */
  #coop-hud {
    display: none;
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .coop-panel {
    position: absolute;
    left: 0; right: 0;
    height: 50%;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 10px 18px;
    background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
  }
  #coop-panel-p1 { top: 0; }
  #coop-panel-p2 { top: 50%; align-items: flex-start; }

  .coop-player-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    padding: 3px 10px;
    border-radius: 3px;
    margin-right: 10px;
    align-self: center;
  }
  .p1-label { background: rgba(255,200,0,0.2); color: #ffcc02; border: 1px solid rgba(255,200,0,0.4); }
  .p2-label { background: rgba(64,170,255,0.2); color: #4af; border: 1px solid rgba(64,170,255,0.4); }

  .coop-stat-row {
    display: flex; gap: 10px; align-items: center;
  }
  .coop-stat {
    background: rgba(0,0,0,0.55);
    border-radius: 5px;
    padding: 5px 12px;
    text-align: center;
  }
  .coop-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: #fff;
    line-height: 1;
  }
  .coop-stat-lbl {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  /* split line divider */
  #coop-divider {
    position: fixed;
    top: 50%; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), rgba(255,255,255,0.3), rgba(255,255,255,0.15), transparent);
    z-index: 11;
    display: none;
  }

  /* coop crosshairs */
  .coop-crosshair {
    position: fixed;
    width: 36px; height: 36px;
    pointer-events: none;
    z-index: 10;
    display: none;
  }
  .coop-crosshair::before, .coop-crosshair::after {
    content: ''; position: absolute; border-radius: 2px;
  }
  #ch-p1::before { width: 2px; height: 18px; top: 9px; left: 17px; background: rgba(255,200,0,0.9); }
  #ch-p1::after  { width: 18px; height: 2px; top: 17px; left: 9px; background: rgba(255,200,0,0.9); }
  #ch-p2::before { width: 2px; height: 18px; top: 9px; left: 17px; background: rgba(64,170,255,0.9); }
  #ch-p2::after  { width: 18px; height: 2px; top: 17px; left: 9px; background: rgba(64,170,255,0.9); }

  .coop-ammo { display:flex; gap:3px; align-items:center; justify-content:center; margin-top:3px; }
  .coop-pip { width:6px; height:6px; border-radius:50%; }
  .coop-pip.p1-full { background:#ffcc02; }
  .coop-pip.p1-empty { background:rgba(255,200,0,0.15); border:1px solid rgba(255,200,0,0.25); }
  .coop-pip.p2-full { background:#4af; }
  .coop-pip.p2-empty { background:rgba(64,170,255,0.15); border:1px solid rgba(64,170,255,0.25); }

  #coop-timer {
    position: fixed; top: calc(50% - 18px); left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.7);
    z-index: 12;
    display: none;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div class="stat-box">
    <div class="stat-label">Puntos</div>
    <div class="stat-value" id="score">0</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">Objetivo</div>
    <div class="stat-value" style="color:#ffcc02">600</div>
    <div class="stat-label" style="font-size:9px; margin-top:2px">MÍNIMO PARA GANAR</div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── AUDIO ───────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx        = null;
let masterGainNode  = null;
let masterVolume    = parseFloat(localStorage.getItem('master_volume') ?? '0.7');

function getAudio() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    masterGainNode = audioCtx.createGain();
    masterGainNode.gain.value = masterVolume;
    masterGainNode.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function getOutput() {
  getAudio();
  return masterGainNode;
}

function setMasterVolume(v) {
  masterVolume = Math.max(0, Math.min(1, v));
  try { localStorage.setItem('master_volume', masterVolume); } catch(e) {}
  if (masterGainNode) masterGainNode.gain.setTargetAtTime(masterVolume, audioCtx.currentTime, 0.01);
}

function playShoot() {
  const ctx = getAudio();
  const t = ctx.currentTime;

  // Main bang
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const dist = ctx.createWaveShaper();

  // Distortion curve
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = (Math.PI + 400) * x / (Math.PI + 400 * Math.abs(x));
  }
  dist.curve = curve;

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);

  gain.gain.setValueAtTime(1.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

  osc.connect(dist);
  dist.connect(gain);
  gain.connect(getOutput());
  osc.start(t);
  osc.stop(t + 0.2);

  // Noise burst (crack)
  const bufSize = ctx.sampleRate * 0.08;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.6, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  noise.connect(noiseGain);
  noiseGain.connect(getOutput());
  noise.start(t);
}

function playReload() {
  const ctx = getAudio();
  const t = ctx.currentTime;

  // Click 1 - eject
  [0, 0.12, 0.28].forEach((delay, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(i === 2 ? 900 : 300 + i * 80, t + delay);
    osc.frequency.exponentialRampToValueAtTime(i === 2 ? 1400 : 180, t + delay + 0.06);
    g.gain.setValueAtTime(0.25, t + delay);
    g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.07);
    osc.connect(g);
    g.connect(getOutput());
    osc.start(t + delay);
    osc.stop(t + delay + 0.08);
  });

  // Metallic slide noise
  const bufSize = ctx.sampleRate * 0.15;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 4000;
  filter.Q.value = 0.5;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.3, t + 0.1);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  noise.connect(filter);
  filter.connect(ng);
  ng.connect(getOutput());
  noise.start(t + 0.1);
}

function playJump() {
  const ctx = getAudio();
  const t = ctx.currentTime;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(520, t + 0.18);
  gain.gain.setValueAtTime(0.35, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  osc.connect(gain);
  gain.connect(getOutput());
  osc.start(t);
  osc.stop(t + 0.25);

  // Soft thud
  const osc2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(90, t);
  osc2.frequency.exponentialRampToValueAtTime(40, t + 0.08);
  g2.gain.setValueAtTime(0.4, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc2.connect(g2);
  g2.connect(getOutput());
  osc2.start(t);
  osc2.stop(t + 0.1);
}

let warningPlayed = false;
function playTimerWarning() {
  if (warningPlayed) return;
  warningPlayed = true;
  const ctx = getAudio();
  const t = ctx.currentTime;

  // Urgent beeping sequence
  [0, 0.35, 0.7, 1.05, 1.4].forEach((delay) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, t + delay);
    g.gain.setValueAtTime(0.0, t + delay);
    g.gain.linearRampToValueAtTime(0.3, t + delay + 0.01);
    g.gain.setValueAtTime(0.3, t + delay + 0.15);
    g.gain.linearRampToValueAtTime(0.0, t + delay + 0.18);
    osc.connect(g);
    g.connect(getOutput());
    osc.start(t + delay);
    osc.stop(t + delay + 0.2);
  });

  // Low bass hit on last beep
  const bass = ctx.createOscillator();
  const bg = ctx.createGain();
  bass.type = 'sine';
  bass.frequency.setValueAtTime(110, t + 1.4);
  bass.frequency.exponentialRampToValueAtTime(55, t + 1.7);
  bg.gain.setValueAtTime(0.5, t + 1.4);
  bg.gain.exponentialRampToValueAtTime(0.001, t + 1.7);
  bass.connect(bg);
  bg.connect(getOutput());
  bass.start(t + 1.4);
  bass.stop(t + 1.8);
}

// ─── SETUP ───────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 20, 120);
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 0);

// Hoisted so resize() can reference it
let coopRunning = false;

function resize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  if (coopRunning) {
    const half = Math.floor(innerHeight / 2);
    cam1.aspect = innerWidth / half;
    cam1.updateProjectionMatrix();
    cam2.aspect = innerWidth / half;
    cam2.updateProjectionMatrix();
  }
}
resize();
window.addEventListener('resize', resize);

// ─── LIGHTS ──────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfffbe6, 1.4);
sun.position.set(30, 60, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.far = 200;
sun.shadow.camera.left = sun.shadow.camera.bottom = -60;
sun.shadow.camera.right = sun.shadow.camera.top = 60;
scene.add(sun);
// Ambient — kept as variable so sky system can update it
scene.add(new THREE.AmbientLight(0xb0d8ff, 0.6));

// ─── WORLD ───────────────────────────────────────────────────────────
let selectedMapId  = localStorage.getItem('selected_map') || 'forest';
// Shared ground mesh (both maps use it, recoloured on map load)
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshLambertMaterial({ color: 0x5a9e3a })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);
const groundMat2 = ground.material; // alias (groundMat set later by sky system)

// ── MAP A: FOREST ─────────────────────────────────────────────────
const forestGroup = new THREE.Group();
scene.add(forestGroup);

// Clouds
for (let i = 0; i < 12; i++) {
  const cloud = new THREE.Group();
  for (let j = 0; j < 5; j++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(Math.random() * 3 + 2, 8, 6),
      new THREE.MeshLambertMaterial({ color: 0xffffff })
    );
    m.position.set((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 4);
    cloud.add(m);
  }
  cloud.position.set((Math.random() - 0.5) * 160, Math.random() * 15 + 15, (Math.random() - 0.5) * 160);
  forestGroup.add(cloud);
}

// Trees
const treeMeshes = [];
const SECRET_TREE_INDEX = Math.floor(Math.random() * 50);
for (let i = 0; i < 50; i++) {
  const tree = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 3, 6),
    new THREE.MeshLambertMaterial({ color: 0x8B5E3C })
  );
  trunk.position.y = 1.5;
  trunk.castShadow = true;
  tree.add(trunk);
  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(2.5, 8, 6),
    new THREE.MeshLambertMaterial({ color: 0x2d7a22 })
  );
  leaves.position.y = 5;
  leaves.castShadow = true;
  tree.add(leaves);
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * 60 + 15;
  tree.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
  tree.userData.isTree = true;
  tree.userData.hits = 0;
  tree.userData.isSecret = (i === SECRET_TREE_INDEX);
  tree.userData.trunkMat = trunk.material;
  tree.userData.leavesMat = leaves.material;
  forestGroup.add(tree);
  treeMeshes.push(tree);
}

// ── MAP B: NEW YORK NIGHT ─────────────────────────────────────────
const nycGroup = new THREE.Group();
scene.add(nycGroup);

// Collision boxes for buildings — checked in movement code
const buildingColliders = []; // { minX, maxX, minZ, maxZ }

(function buildNYC() {
  // ── Shared geometries & materials (reused across all buildings) ────
  const matRoad     = new THREE.MeshLambertMaterial({ color: 0x1a1a1e });
  const matSidewalk = new THREE.MeshLambertMaterial({ color: 0x2a2a30 });
  const matYellow   = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
  const bldgMats    = [0x1c1c28, 0x14141e, 0x1e1e2a, 0x0e0e18].map(c =>
    new THREE.MeshLambertMaterial({ color: c }));
  const matLamp     = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const matLampGlow = new THREE.MeshBasicMaterial({ color: 0xffeebb, transparent: true, opacity: 0.9 });
  const matNeon     = new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.7 });
  const matRoofRed  = new THREE.MeshBasicMaterial({ color: 0xff2200 });
  const matTaxi     = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
  const matDark     = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const matGlass    = new THREE.MeshBasicMaterial({ color: 0x44aacc, transparent: true, opacity: 0.5 });
  const matTrash    = new THREE.MeshLambertMaterial({ color: 0x555555 });
  const matFE       = new THREE.MeshLambertMaterial({ color: 0x884422 });
  const matMoon     = new THREE.MeshBasicMaterial({ color: 0xeeeebb });
  const matStar     = new THREE.MeshBasicMaterial({ color: 0xffffff });

  // Road surface
  const road = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), matRoad);
  road.rotation.x = -Math.PI/2; road.position.y = 0.02;
  nycGroup.add(road);

  // Road markings — merged into one BufferGeometry
  {
    const markGeo = new THREE.BufferGeometry();
    const positions = [];
    const addQuad = (x, z, w, h) => {
      positions.push(
        x-w/2, 0.03, z-h/2,  x+w/2, 0.03, z-h/2,  x+w/2, 0.03, z+h/2,
        x-w/2, 0.03, z-h/2,  x+w/2, 0.03, z+h/2,  x-w/2, 0.03, z+h/2,
      );
    };
    for (let z = -90; z <= 90; z += 10) addQuad(0, z, 0.25, 4);
    for (let x = -90; x <= 90; x += 10) addQuad(x, 0, 4, 0.25);
    markGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    markGeo.computeVertexNormals();
    nycGroup.add(new THREE.Mesh(markGeo, matYellow));
  }

  // ── Buildings ──────────────────────────────────────────────────────
  // Build all window positions across all buildings, then batch into
  // two InstancedMesh: windows-on and windows-off.
  const buildingDefs = [];
  const rng = (min, max) => min + Math.random() * (max - min);

  for (let x = -55; x <= 55; x += 14) {
    buildingDefs.push({ x, z: -58, w: rng(10,14), h: rng(18,48), d: rng(8,12) });
    buildingDefs.push({ x, z:  58, w: rng(10,14), h: rng(18,48), d: rng(8,12) });
  }
  for (let z = -44; z <= 44; z += 14) {
    buildingDefs.push({ x: -58, z, w: rng(8,12), h: rng(18,48), d: rng(10,14) });
    buildingDefs.push({ x:  58, z, w: rng(8,12), h: rng(18,48), d: rng(10,14) });
  }
  // Background depth buildings
  const bgDefs = [
    [-80,-40,12,35,10],[ 80,-40,12,42,10],[-80,40,12,28,10],[ 80,40,12,38,10],
    [-40,-80,14,32,12],[ 40,-80,14,45,12],[-40,80,14,28,12],[ 40,80,14,40,12],
  ];
  for (const [x,z,w,h,dep] of bgDefs) buildingDefs.push({ x, z, w, h, d: dep });

  // Shared box geometry for building block (scaled per instance)
  const unitBox   = new THREE.BoxGeometry(1, 1, 1);

  // Pre-count total window instances
  let totalWinOn = 0, totalWinOff = 0;
  for (const b of buildingDefs) {
    const cols  = Math.floor(b.w / 2.2);
    const rows  = Math.floor(b.h / 3.0);
    const sideC = Math.floor(b.d / 2.2);
    const facePairs = cols * rows * 2;   // front + back
    const sidePairs = sideC * rows * 2;  // left + right
    const total = facePairs + sidePairs;
    totalWinOn  += Math.ceil(total * 0.65);
    totalWinOff += Math.floor(total * 0.35);
  }

  // InstancedMesh for windows
  const winGeoInst   = new THREE.PlaneGeometry(0.7, 1.0);
  const matWinOn  = new THREE.MeshBasicMaterial({ color: 0xffee88, transparent: true, opacity: 0.88 });
  const matWinOff = new THREE.MeshBasicMaterial({ color: 0x223344, transparent: true, opacity: 0.35 });
  const instOn    = new THREE.InstancedMesh(winGeoInst, matWinOn,  totalWinOn  + 50);
  const instOff   = new THREE.InstancedMesh(winGeoInst, matWinOff, totalWinOff + 50);
  instOn.frustumCulled  = false;
  instOff.frustumCulled = false;
  nycGroup.add(instOn);
  nycGroup.add(instOff);

  let iOn = 0, iOff = 0;
  const dummy = new THREE.Object3D();

  for (const b of buildingDefs) {
    const bw = b.w, bh = b.h, bd = b.d;

    // Building block — just scale a unit box
    const mat   = bldgMats[Math.floor(Math.random() * bldgMats.length)];
    const block = new THREE.Mesh(unitBox, mat);
    block.scale.set(bw, bh, bd);
    block.position.set(b.x, bh/2, b.z);
    block.castShadow = false; // no shadows — big perf win
    nycGroup.add(block);

    buildingColliders.push({
      minX: b.x - bw/2, maxX: b.x + bw/2,
      minZ: b.z - bd/2, maxZ: b.z + bd/2,
    });

    // Windows — instanced
    const cols  = Math.floor(bw / 2.2);
    const rows  = Math.floor(bh / 3.0);
    const sideC = Math.floor(bd / 2.2);

    // Front (+Z) and back (-Z)
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const wx = b.x - bw/2 + 1.1 + col * (bw / cols);
        const wy = 1.5 + row * 3.0;
        for (const [wz, ry] of [[b.z + bd/2 + 0.02, 0], [b.z - bd/2 - 0.02, Math.PI]]) {
          const on = Math.random() > 0.35;
          dummy.position.set(wx, wy, wz);
          dummy.rotation.set(0, ry, 0);
          dummy.updateMatrix();
          if (on) instOn.setMatrixAt(iOn++, dummy.matrix);
          else    instOff.setMatrixAt(iOff++, dummy.matrix);
        }
      }
    }
    // Left (+X) and right (-X)
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < sideC; col++) {
        const wz = b.z - bd/2 + 1.1 + col * (bd / sideC);
        const wy = 1.5 + row * 3.0;
        for (const [wx, ry] of [[b.x + bw/2 + 0.02, Math.PI/2], [b.x - bw/2 - 0.02, -Math.PI/2]]) {
          const on = Math.random() > 0.4;
          dummy.position.set(wx, wy, wz);
          dummy.rotation.set(0, ry, 0);
          dummy.updateMatrix();
          if (on) instOn.setMatrixAt(iOn++, dummy.matrix);
          else    instOff.setMatrixAt(iOff++, dummy.matrix);
        }
      }
    }

    // Rooftop detail
    if (Math.random() > 0.5) {
      const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 2.0, 6), mat);
      tower.position.set(b.x, bh + 1.0, b.z);
      nycGroup.add(tower);
    } else {
      const antH = 4 + Math.random() * 4;
      const ant  = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, antH, 4), mat);

const fireGeo  = new THREE.BufferGeometry();

// Per-particle state
for (let i = 0; i < FIRE_COUNT; i++) {

  });
}

// Spawn positions along the gun barrel (in gunGroup local space)
// AK barrel runs roughly from z=0.05 down to z=-0.52 in gunGroup coords
function spawnFireParticle(p) {
  // Hug the barrel surface — minimal spread, minimal velocity
  const t  = Math.random();
  p.x  = (Math.random() - 0.5) * 0.012;
  p.y  =  0.010 + Math.random() * 0.006; // just above surface
  p.z  = -0.06 - t * 0.38;              // along barrel
  const speed = 0.004 + Math.random() * 0.006; // very slow
  p.vx = (Math.random() - 0.5) * 0.008;
  p.vy = speed;
  p.vz = (Math.random() - 0.5) * 0.006;
  p.maxLife = 0.18 + Math.random() * 0.18; // short life
  p.life    = p.maxLife;
  p.dead    = false;
}

function updateFireParticles(dt) {
  if (!fireGroup.visible) return;

  // Spawn ~3-5 new particles per frame
  const spawnCount = 2 + Math.floor(Math.random() * 2);
  let spawned = 0;
  for (let i = 0; i < FIRE_COUNT && spawned < spawnCount; i++) {
    if (fireParticles[i].dead) { spawnFireParticle(fireParticles[i]); spawned++; }
  }

  const pos   = fireGeo.attributes.position.array;
  const col   = fireGeo.attributes.color.array;
  const sizes = fireGeo.attributes.size.array;

  for (let i = 0; i < FIRE_COUNT; i++) {
    const p = fireParticles[i];
    if (p.dead) {
      // Hide dead particles at origin (behind camera)
      pos[i*3]=0; pos[i*3+1]=0; pos[i*3+2]=0.5;
      col[i*3]=0; col[i*3+1]=0; col[i*3+2]=0;
      sizes[i] = 0;
      continue;
    }

    p.life -= dt;
    if (p.life <= 0) { p.dead = true; continue; }

    // Integrate position — very subtle, hug the barrel
    p.vy   += dt * 0.012; // minimal upward drift
    p.vx   *= 0.92;
    p.vz   *= 0.92;
    p.x    += p.vx * dt * 60;
    p.y    += p.vy * dt * 60;
    p.z    += p.vz * dt * 60;

    pos[i*3]   = p.x;
    pos[i*3+1] = p.y;
    pos[i*3+2] = p.z;

    // Colour: core=white-yellow → orange → red → dark/transparent at end
    const t = 1 - p.life / p.maxLife;  // 0=fresh, 1=dying
    let r, g, b;
    if (t < 0.2) {
      // Core: white-yellow
      r = 1.0; g = 1.0; b = 0.5 * (1 - t/0.2);
    } else if (t < 0.5) {
      // Orange
      const tt = (t - 0.2) / 0.3;
      r = 1.0; g = 1.0 - tt * 0.7; b = 0;
    } else if (t < 0.8) {
      // Red
      const tt = (t - 0.5) / 0.3;
      r = 1.0 - tt * 0.3; g = 0.3 - tt * 0.3; b = 0;
    } else {
      // Dying dark red/smoke
      const tt = (t - 0.8) / 0.2;
      r = 0.4 - tt * 0.4; g = 0; b = 0;
    }
    col[i*3]   = r;
    col[i*3+1] = g;
    col[i*3+2] = b;

    // Size: large at start, shrinks as it rises
    sizes[i] = (1 - t) * 0.03 + 0.005;
  }

  fireGeo.attributes.position.needsUpdate = true;
  fireGeo.attributes.color.needsUpdate    = true;
  fireGeo.attributes.size.needsUpdate     = true;
  fireSpriteMat.size = 0.022;
}

function spawnEmber(p) {
  const t  = Math.random();
  p.x  = (Math.random() - 0.5) * 0.010;
  p.y  =  0.008 + Math.random() * 0.006;
  p.z  = -0.06 - t * 0.38;
  const spd = 0.008 + Math.random() * 0.012; // very slow
  const ang = Math.random() * Math.PI * 2;
  p.vx = Math.cos(ang) * spd * 0.3;
  p.vy = spd;
  p.vz = Math.sin(ang) * spd * 0.2;
  p.maxLife = 0.12 + Math.random() * 0.14;
  p.life = p.maxLife;
  p.dead = false;
}

function updateEmbers(dt) {
  if (!fireGroup.visible) return;
  if (Math.random() < 0.4) {
    for (let i = 0; i < EMBER_COUNT; i++) {
      if (emberParticles[i].dead) { spawnEmber(emberParticles[i]); break; }
    }
  }
  const pos = emberGeo.attributes.position.array;
  const col = emberGeo.attributes.color.array;
  for (let i = 0; i < EMBER_COUNT; i++) {
    const p = emberParticles[i];
    if (p.dead) { pos[i*3]=0; pos[i*3+1]=0; pos[i*3+2]=0.5; col[i*3]=col[i*3+1]=col[i*3+2]=0; continue; }
    p.life -= dt;
    if (p.life <= 0) { p.dead = true; continue; }
    p.vy  -= dt * 0.008; // minimal gravity
    p.vx  *= 0.98; p.vz *= 0.98;
    p.x   += p.vx * dt * 60;
    p.y   += p.vy * dt * 60;
    p.z   += p.vz * dt * 60;
    pos[i*3]=p.x; pos[i*3+1]=p.y; pos[i*3+2]=p.z;
    const br = p.life / p.maxLife;
    col[i*3] = 1.0; col[i*3+1] = br * 0.6; col[i*3+2] = 0;
  }
  emberGeo.attributes.position.needsUpdate = true;
  emberGeo.attributes.color.needsUpdate    = true;
}

}

// ── Knife slash sound ────────────────────────────────────────────────
function playKnifeSwing() {
  const ctx = getAudio();
  const t = ctx.currentTime;

  // Whoosh — filtered noise sweep high→low
  const bufSize = ctx.sampleRate * 0.18;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = ctx.createBufferSource();
  src.buffer = buf;

  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(3800, t);
  filter.frequency.exponentialRampToValueAtTime(800, t + 0.18);
  filter.Q.value = 1.2;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.55, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

  src.connect(filter); filter.connect(gain); gain.connect(getOutput());
  src.start(t); src.stop(t + 0.2);

  // Metallic ting at impact point
  const osc = ctx.createOscillator();
  const og  = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(2200, t + 0.06);
  osc.frequency.exponentialRampToValueAtTime(900, t + 0.14);
  og.gain.setValueAtTime(0.18, t + 0.06);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  osc.connect(og); og.connect(getOutput());
  osc.start(t + 0.06); osc.stop(t + 0.24);
}

function playKnifeHit() {
  const ctx = getAudio();
  const t = ctx.currentTime;
  // Wet thud
  const bufSize = ctx.sampleRate * 0.12;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 1.5);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 600;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  src.connect(lp); lp.connect(g); g.connect(getOutput());
  src.start(t); src.stop(t + 0.14);
}

// ── Knife slash trigger ──────────────────────────────────────────────
function knifeSlash() {
  if (knifePhase !== 'idle') return; // already animating
  knifePhase = 'swing';
  knifeAnim  = 0;
  playKnifeSwing();

  // Hit detection — check ducks within melee range (2.2 units)
  const MELEE_RANGE = 2.2;
  let hitAny = false;
  for (const duck of ducks) {
    if (!duck.userData.alive) continue;
    const dist = camera.position.distanceTo(duck.position);
    if (dist < MELEE_RANGE) {
      // Also check it's roughly in front (dot product)
      const toTarget = duck.position.clone().sub(camera.position).normalize();
      const forward  = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
      if (forward.dot(toTarget) > 0.4) {
        killDuck(duck, 30);
        hitAny = true;
      }
    }
  }
  if (hitAny) {
    playKnifeHit();
    const flash = document.getElementById('hit-flash');
    flash.style.opacity = '1';
    setTimeout(() => flash.style.opacity = '0', 60);
  }
}

// ── Update knife animation (called from update loop) ─────────────────
function updateKnifeAnim(dt) {
  if (!knifeActive || knifePhase === 'idle') return;

  knifeAnim += dt;

  if (knifePhase === 'swing') {
    // Phase 1: fast forward slash — knife lunges forward+left, rotates
    const p = Math.min(1, knifeAnim / KNIFE_SWING_T);
    const ease = p < 0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2; // easeInOut
    gunGroup.position.set(
      knifeBasePosX - ease * 0.10,
      knifeBasePosY + ease * 0.06,
      knifeBasePosZ - ease * 0.12
    );
    gunGroup.rotation.set(
      0.10 - ease * 0.55,   // stab/slash forward tilt
      0.08 + ease * 0.25,
     -0.05 - ease * 0.45    // roll slash
    );
    if (knifeAnim >= KNIFE_SWING_T) {
      knifePhase = 'return';
      knifeAnim  = 0;
    }
  } else if (knifePhase === 'return') {
    // Phase 2: ease back to resting position
    const p    = Math.min(1, knifeAnim / KNIFE_RETURN_T);
    const ease = 1 - Math.pow(1 - p, 3); // easeOutCubic
    gunGroup.position.set(
      knifeBasePosX - (1-ease) * 0.10,
      knifeBasePosY + (1-ease) * 0.06,
      knifeBasePosZ - (1-ease) * 0.12
    );
    gunGroup.rotation.set(
      0.10 - (1-ease) * 0.55,
      0.08 + (1-ease) * 0.25,
     -0.05 - (1-ease) * 0.45
    );
    if (knifeAnim >= KNIFE_RETURN_T) {
      knifePhase = 'idle';
      gunGroup.position.set(knifeBasePosX, knifeBasePosY, knifeBasePosZ);
      gunGroup.rotation.set(0.10, 0.08, -0.05);
    }
  }
}

    ear.position.set(sx * 0.27, 0.84, 0.42);
    ear.rotation.z = sx * 0.22; // slight outward tilt

    [-0.18,  0.34, -0.28], [ 0.18,  0.34, -0.28],  // back

    leg.add(paw);
    leg.position.set(...legPositions[i]);

  // ── Tail ─────────────────────────────────────────────────────────

function playDogBark() {
  try {
    const ctx = getAudio();
    const t   = ctx.currentTime;
    // Two short "woof" bursts
    for (let b = 0; b < 2; b++) {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      const off = b * 0.22;
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(380, t + off);
      osc.frequency.exponentialRampToValueAtTime(200, t + off + 0.12);
      g.gain.setValueAtTime(0, t + off);
      g.gain.linearRampToValueAtTime(0.22, t + off + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.14);
      osc.connect(g); g.connect(getOutput());
      osc.start(t + off); osc.stop(t + off + 0.16);
    }
  } catch(e) {}
}

function updateDog(dt) {
  if (activeMode === 'none') { dogMesh.visible = false; return; }
  dogMesh.visible = true;

  const playerPos = camera.position;

  // ── Target: stay 1.8–3.0 units behind+beside the player ──────────
  const distToPlayer = dogState.pos.distanceTo(playerPos);
  const runSpeed     = distToPlayer > 5 ? 5.5 : distToPlayer > 2.5 ? 3.2 : 1.2;

  // Desired offset: slightly to the right and behind
  const forward = new THREE.Vector3(-Math.sin(rotY), 0, -Math.cos(rotY));
  const right   = new THREE.Vector3(forward.z, 0, -forward.x);
  dogState.targetPos.copy(playerPos)
    .addScaledVector(forward, -1.8)
    .addScaledVector(right,    0.9)
    .setY(0);

  // Move toward target
  const toTarget = dogState.targetPos.clone().sub(dogState.pos);
  const dist     = toTarget.length();
  if (dist > 0.05) {
    toTarget.normalize().multiplyScalar(Math.min(runSpeed * dt, dist));
    dogState.pos.add(toTarget);
  }

  // Keep on ground
  dogState.pos.y = 0;
  dogMesh.position.copy(dogState.pos);

  // Face direction of movement (smooth)
  if (dist > 0.1) {
    const targetAngle = Math.atan2(toTarget.x, toTarget.z);
    let   da          = targetAngle - dogMesh.rotation.y;
    while (da >  Math.PI) da -= Math.PI * 2;
    while (da < -Math.PI) da += Math.PI * 2;
    dogMesh.rotation.y += da * Math.min(1, dt * 10);
  }

  // ── Leg walk animation ─────────────────────────────────────────────
  const isMoving = dist > 0.12;
  if (isMoving) dogState.animT += dt * runSpeed * 4;

  const legs = dogMesh.userData.legs;
  if (legs) {
    // FR=0, FL=1 in phase, BR=2, BL=3 — opposite pairs swing together
    const phases = [0, Math.PI, Math.PI, 0];
    for (let i = 0; i < 4; i++) {
      const swing = isMoving
        ? Math.sin(dogState.animT + phases[i]) * 0.35
        : 0;
      legs[i].rotation.x += (swing - legs[i].rotation.x) * Math.min(1, dt * 12);
    }
  }

  // ── Bob body up/down slightly while moving ─────────────────────────
  const bobY = isMoving ? Math.abs(Math.sin(dogState.animT * 0.5)) * 0.04 : 0;
  dogMesh.children.forEach(c => {
    if (c.geometry && c.geometry.type === 'CircleGeometry') return; // skip shadow
  });
  // Apply bob via group Y offset (relative to pos)
  dogMesh.position.y = bobY;

  // ── Tail wag ──────────────────────────────────────────────────────
  const tail = dogMesh.userData.tail;
  if (tail) {
    const wagSpeed = isMoving ? 8 : 4;
    tail.rotation.y = Math.sin(dogState.animT * wagSpeed * 0.5) * 0.6;
  }

  // ── Bark timer ────────────────────────────────────────────────────
  dogState.barkTimer -= dt;
  if (dogState.barkTimer <= 0) {
    dogState.barking  = true;
    dogState.barkDur  = 0.55;
    dogState.barkTimer = 4 + Math.random() * 8; // next bark in 4-12s
    playDogBark();
  }
  if (dogState.barking) {
    dogState.barkDur -= dt;
    const tongue = dogMesh.userData.tongue;
    if (tongue) tongue.visible = true;
    // Head bob during bark
    const head = dogMesh.userData.head;
    if (head) head.rotation.x = Math.sin(dogState.barkDur * 30) * 0.08;
    if (dogState.barkDur <= 0) {
      dogState.barking = false;
      if (tongue) tongue.visible = false;
      if (head)   head.rotation.x = 0;
    }
  }
}

// ─── MINIGUN SOUNDS ───────────────────────────────────────────────────
function playMinigunShot() {
  const ctx = getAudio();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(120, t);
  osc.frequency.exponentialRampToValueAtTime(50, t + 0.05);
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  const dist = ctx.createWaveShaper();
  const curve = new Float32Array(128);
  for (let i = 0; i < 128; i++) { const x = (i*2)/128-1; curve[i]=(Math.PI+300)*x/(Math.PI+300*Math.abs(x)); }
  dist.curve = curve;
  osc.connect(dist); dist.connect(g); g.connect(getOutput());
  osc.start(t); osc.stop(t + 0.07);
  // Crack
  const nb = ctx.createBuffer(1, ctx.sampleRate*0.04, ctx.sampleRate);
  const nd = nb.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1);
  const ns = ctx.createBufferSource(); ns.buffer = nb;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.3, t); ng.gain.exponentialRampToValueAtTime(0.001, t+0.04);
  ns.connect(ng); ng.connect(getOutput()); ns.start(t);
}

function playPickupOrb() {
  const ctx = getAudio();
  const t = ctx.currentTime;
  [0, 0.1, 0.2].forEach((d, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440 + i*220, t+d);
    osc.frequency.exponentialRampToValueAtTime(880 + i*220, t+d+0.12);
    g.gain.setValueAtTime(0.3, t+d);
    g.gain.exponentialRampToValueAtTime(0.001, t+d+0.15);
    osc.connect(g); g.connect(getOutput());
    osc.start(t+d); osc.stop(t+d+0.16);
  });
}

function playMinigunEnd() {
  const ctx = getAudio();

    new THREE.SphereGeometry(0.28, 16, 12),
    new THREE.MeshLambertMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 0.8 })
  );
  orbGroup.add(core);

  const ring1 = new THREE.Mesh(
    new THREE.TorusGeometry(0.42, 0.04, 8, 24),
    new THREE.MeshLambertMaterial({ color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 0.6 })
  );
  orbGroup.add(ring1);

  // Outer ring 2 (perpendicular)
  const ring2 = new THREE.Mesh(
    new THREE.TorusGeometry(0.42, 0.04, 8, 24),
    new THREE.MeshLambertMaterial({ color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 0.6 })
  );
  ring2.rotation.x = Math.PI / 2;
  orbGroup.add(ring2);

    );

// ─── SHOOT ───────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();

function shoot() {
  if (ammo <= 0 || reloading) return;
  ammo--;
  updateAmmoUI();

  // gun kick animation
  gsap_kickGun();
  playShoot();

  // Raycast from center of screen
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

  // Check each duck
  let hit = null;
  let closestDist = Infinity;

  for (const duck of ducks) {
    if (!duck.userData.alive) continue;
    const sphere = new THREE.Sphere(duck.position, duck.userData.radius);
    const pt = new THREE.Vector3();
    if (raycaster.ray.intersectSphere(sphere, pt)) {
      const d = camera.position.distanceTo(duck.position);
      if (d < closestDist) { closestDist = d; hit = duck; }
    }
  }

  if (hit) {
    killDuck(hit);
  }

  // Check tree hits
  if (!hit) {
    // Build list of all tree child meshes for intersection
    const treeParts = [];
    for (const t of treeMeshes) treeParts.push(...t.children);
    const treeHits = raycaster.intersectObjects(treeParts);
    if (treeHits.length > 0) {
      // Find parent tree group
      const hitMesh = treeHits[0].object;
      const parentTree = treeMeshes.find(t => t.children.includes(hitMesh));
      if (parentTree) hitTree(parentTree);
    }
  }

  // Bullet tracer
  {
    const muzzle = getMuzzleWorldPos();
    const dir    = raycaster.ray.direction.clone().normalize();
    const dist   = hit ? camera.position.distanceTo(hit.position) : 80;
    spawnTracer(muzzle, dir, dist);
  }

  if (ammo === 0) setTimeout(reload, 300);
}

function hitTree(tree) {
  if (!tree.userData.isSecret || tree.userData.hits >= 3) return;
  tree.userData.hits++;

  // Flash the tree white briefly
  tree.userData.leavesMat.color.set(0xffffff);
  tree.userData.trunkMat.color.set(0xffffff);
  setTimeout(() => {
    const h = tree.userData.hits;
    // Color shifts: green → yellow → orange → gone
    const leafColors = [0x2d7a22, 0xd4a017, 0xff6600];
    tree.userData.leavesMat.color.set(leafColors[h - 1] || 0x2d7a22);
    tree.userData.trunkMat.color.set(0x8B5E3C);
  }, 80);

  // Show hit counter message
  const msg = document.getElementById('kill-msg');
  const remaining = 3 - tree.userData.hits;
  if (remaining > 0) {
    msg.style.color = '#aaffaa';
    msg.style.textShadow = '0 0 20px #00ff88';
    msg.textContent = `🌲 ${remaining} impacto${remaining > 1 ? 's' : ''} más...`;
    msg.style.opacity = '1';
    msg.style.transform = 'translateY(-8px)';
    setTimeout(() => {
      msg.style.opacity = '0';
      msg.style.transform = 'translateY(0)';
      msg.style.color = '#ff6b35';
      msg.style.textShadow = '0 0 10px #ff6b35';
      msg.textContent = '+10 PTS';
    }, 800);
  }

  if (tree.userData.hits >= 3) {
    // Shake and fall the tree
    let shake = 0;
    const shakeInterval = setInterval(() => {
      shake += 0.3;
      tree.rotation.z = Math.sin(shake) * 0.15;
      if (shake > 5) {
        clearInterval(shakeInterval);
        tree.rotation.z = 0;
      }
    }, 30);

    setTimeout(() => {
      window.open('https://youtu.be/dQw4w9WgXcQ?si=aoGkdYyo-xSZ2HKr', '_blank');
    }, 500);
  }
}

let dashVel = new THREE.Vector3();
let dashTimer = 0;
let dashCooldown = 0;
const DASH_DURATION = 0.18;
const DASH_SPEED = 28;
const DASH_COOLDOWN = 1.0;

function playDash() {
  const ctx = getAudio();
  const t = ctx.currentTime;
  // Whoosh: filtered noise sweep
  const bufSize = ctx.sampleRate * 0.25;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(400, t);
  filter.frequency.exponentialRampToValueAtTime(3200, t + 0.12);
  filter.frequency.exponentialRampToValueAtTime(600, t + 0.25);
  filter.Q.value = 1.5;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.5, t + 0.03);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  noise.connect(filter);
  filter.connect(g);
  g.connect(getOutput());
  noise.start(t);

  // Sharp pitch blip
  const osc = ctx.createOscillator();
  const og = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, t);
  osc.frequency.exponentialRampToValueAtTime(150, t + 0.15);
  og.gain.setValueAtTime(0.25, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(og);
  og.connect(getOutput());
  osc.start(t);
  osc.stop(t + 0.16);
}

      inspectAnim  = true;

  // F key — melee slash (brief, returns to previous weapon)

  if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && gameRunning && dashCooldown <= 0) {

    const dir = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp'])    dir.z -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  dir.z += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  dir.x -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;
    if (dir.length() === 0) dir.z = -1; // default: forward
    dir.normalize().applyEuler(new THREE.Euler(0, rotY, 0));
    dashVel.copy(dir.multiplyScalar(DASH_SPEED));
    dashTimer = DASH_DURATION;
    dashCooldown = DASH_COOLDOWN;

    camera.fov = 95;

    flash.style.opacity = '1';
    setTimeout(() => {
      flash.style.opacity = '0';
      flash.style.background = 'rgba(255,255,100,0.3)';
    }, 120);
    e.preventDefault();
  }
});



// ─── INSPECT ANIMATION ───────────────────────────────────────────────
function playInspectSound() {
  const ctx = getAudio();
  const t = ctx.currentTime;
  // Subtle metallic tap sounds at key moments
  [[0.0, 800, 0.06], [0.55, 1200, 0.04], [1.1, 600, 0.07],
   [1.8, 900, 0.05], [2.4, 1100, 0.04], [3.0, 700, 0.06]].forEach(([delay, freq, gain]) => {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t + delay);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + delay + 0.06);
    g.gain.setValueAtTime(0, t + delay);
    g.gain.linearRampToValueAtTime(gain, t + delay + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.08);
    osc.connect(g); g.connect(getOutput());
    osc.start(t + delay); osc.stop(t + delay + 0.1);
  });
}

function updateInspectAnim(dt) {
  if (!inspectAnim) return;

  inspectAnimT = Math.min(inspectAnimT + dt, INSPECT_DUR);
  const p = inspectAnimT / INSPECT_DUR;

  const easeOut   = t => 1 - Math.pow(1 - t, 3);
  const easeIn    = t => t * t * t;
  const easeInOut = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  const smooth    = t => t * t * (3 - 2 * t); // smoothstep

  // Normalised time within each phase
  // Phase 0 0.00–0.12  lower gun from sight line
  // Phase 1 0.12–0.32  rotate toward player (flip bottom up)
  // Phase 2 0.32–0.55  tilt to inspect left side / magazine
  // Phase 3 0.55–0.72  swing to right / inspect ejection port
  // Phase 4 0.72–0.88  flip back to normal orientation
  // Phase 5 0.88–1.00  ease back to rest position

  let offsetX = 0, offsetY = 0, offsetZ = 0;
  let rotX = 0, rotY = 0, rotZ = 0;

  if (p < 0.12) {
    // Lower gun and center it slightly
    const t = easeIn(p / 0.12);
    offsetY = -0.10 * t;
    offsetX = -0.05 * t;   // pull toward center
    offsetZ =  0.06 * t;
    rotX    =  0.20 * t;   // barrel tips down
    rotY    = -0.10 * t;
  } else if (p < 0.32) {
    // Rotate bottom of gun toward player — main inspection pose
    const t = easeInOut((p - 0.12) / 0.20);
    offsetY = -0.10 - 0.04 * t;
    offsetX = -0.05 + 0.10 * t;   // drifts right as it rotates
    offsetZ =  0.06 + 0.04 * t;
    rotX    =  0.20 + 0.95 * t;   // ~65° total — bottom faces player
    rotY    = -0.10 - 0.15 * t;
    rotZ    =  0.10 * Math.sin(t * Math.PI); // slight wobble mid-rotation
  } else if (p < 0.55) {
    // Hold rotated, tilt left — inspecting magazine / left side
    const t = easeInOut((p - 0.32) / 0.23);
    offsetY = -0.14;
    offsetX =  0.05 - 0.08 * t;
    offsetZ =  0.10;
    rotX    =  1.15;
    rotY    = -0.25 - 0.30 * t;   // yaws left
    rotZ    =  0.35 * t;           // rolls to show underside
  } else if (p < 0.72) {
    // Swing right — inspecting ejection port / right side
    const t = easeInOut((p - 0.55) / 0.17);
    offsetY = -0.14 + 0.02 * t;
    offsetX =  0.05 - 0.05 * (1 - t);
    offsetZ =  0.10;
    rotX    =  1.15 - 0.10 * t;
    rotY    = -0.55 + 0.70 * t;   // swings back past neutral to right
    rotZ    =  0.35 - 0.55 * t;   // rolls opposite
  } else if (p < 0.88) {
    // Flip back to normal forward orientation
    const t = easeOut((p - 0.72) / 0.16);
    offsetY = -0.12 + 0.12 * t;
    offsetX =  0.00;
    offsetZ =  0.10 - 0.10 * t;
    rotX    =  1.05 - 1.05 * t;
    rotY    =  0.15 - 0.15 * t;
    rotZ    = -0.20 + 0.20 * t;
  } else {
    // Settle back — elastic-like ease
    const t = easeOut((p - 0.88) / 0.12);
    const bounce = Math.sin(t * Math.PI) * 0.03;
    offsetY =  bounce;
    offsetX =  0; offsetZ = 0; rotX = 0; rotY = 0; rotZ = 0;
  }

  const isMg  = hasMinigun;
  const baseX = isMg ? 0.20  : 0.18;
  const baseY = isMg ? -0.22 : -0.24;
  const baseZ = isMg ? -0.36 : -0.38;
  const baseRX= isMg ? 0.02  : 0.04;
  const baseRY= isMg ? 0.05  : 0.06;

  gunGroup.position.set(baseX + offsetX, baseY + offsetY, baseZ + offsetZ);
  gunGroup.rotation.set(baseRX + rotX, baseRY + rotY, rotZ);

  if (inspectAnimT >= INSPECT_DUR) inspectAnim = false;
}

// ─── RELOAD ANIMATION ────────────────────────────────────────────────
function updateReloadAnim(dt) {
  if (!reloadAnim) return;

  reloadAnimT = Math.min(reloadAnimT + dt, RELOAD_DUR);
  const p = reloadAnimT / RELOAD_DUR;

  const easeOut   = t => 1 - Math.pow(1 - t, 3);
  const easeIn    = t => t * t * t;
  const easeInOut = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  const elastic   = t => t === 0 ? 0 : t === 1 ? 1 :
    Math.pow(2, -10*t) * Math.sin((t*10 - 0.75) * (2*Math.PI/3)) + 1;

  let offsetX = 0, offsetY = 0, offsetZ = 0;
  let rotX = 0, rotY = 0, rotZ = 0;

  if (p < 0.18) {
    // Phase 1 — MAG EJECT: gun swings hard down-right, barrel tips down sharply
    const t = easeIn(p / 0.18);
    offsetY = -0.16 * t;
    offsetX =  0.10 * t;
    offsetZ =  0.07 * t;
    rotX    =  0.80 * t;
    rotZ    = -0.48 * t;
    rotY    =  0.14 * t;
  } else if (p < 0.42) {
    // Phase 2 — MAG INSERT: sweeps across body
    const t = easeInOut((p - 0.18) / 0.24);
    offsetY = -0.16 + (-0.05) * Math.sin(t * Math.PI);
    offsetX =  0.10 - 0.26 * t;
    offsetZ =  0.07 + 0.10 * t;
    rotX    =  0.80 - 0.40 * t;
    rotZ    = -0.48 + 0.64 * t;
    rotY    =  0.14 - 0.26 * t;
  } else if (p < 0.62) {
    // Phase 3 — CHARGING HANDLE: bolt pull
    const t = easeOut((p - 0.42) / 0.20);
    const bolt = Math.sin(t * Math.PI);
    offsetY = -0.21 + 0.21 * t;
    offsetX = -0.16 + 0.16 * t;
    offsetZ =  0.17 - 0.12 * t - 0.15 * bolt;
    rotX    =  0.40 - 0.58 * t;
    rotZ    =  0.16 - 0.16 * t;
    rotY    = -0.12 + 0.12 * t;
  } else if (p < 0.80) {
    // Phase 4 — SNAP UP
    const t = easeOut((p - 0.62) / 0.18);
    offsetY =  0.05 * Math.sin(t * Math.PI * 0.9);
    offsetX =  0.03 * (1 - t);
    offsetZ = -0.06 * (1 - t);
    rotX    = -0.16 * Math.sin(t * Math.PI);
    rotZ    =  0.06 * (1 - t);
    rotY    =  0;
  } else {
    // Phase 5 — SETTLE
    const t = elastic((p - 0.80) / 0.20);
    offsetY = 0.05 * (1 - t);
    offsetX = 0; offsetZ = 0; rotX = 0; rotZ = 0; rotY = 0;
  }

  const isMg   = hasMinigun;
  const baseX  = isMg ? 0.20  : 0.18;
  const baseY  = isMg ? -0.22 : -0.24;
  const baseZ  = isMg ? -0.36 : -0.38;
  const baseRX = isMg ? 0.02  : 0.04;
  const baseRY = isMg ? 0.05  : 0.06;

  gunGroup.position.set(baseX + offsetX, baseY + offsetY, baseZ + offsetZ);
  gunGroup.rotation.set(baseRX + rotX, baseRY, rotZ);

  if (reloadAnimT >= RELOAD_DUR) reloadAnim = false;
}
