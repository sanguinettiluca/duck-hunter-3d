function updateGunSway(dt, isMoving, isDashing, inAir) {
  // ── Walk bob ──────────────────────────────────────────────────────
  const targetSpeed = isMoving ? BOB_FREQ : 0;
  swaySpeed += (targetSpeed - swaySpeed) * Math.min(1, dt * 10);
  if (isMoving || swaySpeed > 0.01) swayTime += dt * swaySpeed;

  const bobFrac = swaySpeed / BOB_FREQ;
  const bobY    =  Math.sin(swayTime)       * BOB_AMP_Y * bobFrac;
  const bobX    =  Math.sin(swayTime * 0.5) * BOB_AMP_X * bobFrac;
  const bobRot  =  Math.sin(swayTime)       * BOB_ROT   * bobFrac;

  // ── Jump / landing ────────────────────────────────────────────────
  if (inAir) {
    jumpAnimT = Math.min(1, jumpAnimT + dt * 4);
  } else {
    if (jumpAnimT > 0.05) landAnimT = Math.min(1, jumpAnimT * 1.2);
    jumpAnimT = 0;
  }
  landAnimT = Math.max(0, landAnimT - dt * LAND_DECAY);

  const jumpLift    =  Math.sin(jumpAnimT * Math.PI) *  0.04;
  const jumpTilt    =  jumpAnimT * -0.20;
  const landSquish  =  Math.sin(landAnimT * Math.PI) * -0.06;
  const landRot     =  Math.sin(landAnimT * Math.PI) *  0.12;

  // ── Dash lean ─────────────────────────────────────────────────────
  const dashTarget = isDashing ? Math.min(1, dashTimer / DASH_DURATION) : 0;
  dashAnimT += (dashTarget - dashAnimT) * Math.min(1, dt * 18);
  const dashLean  = dashAnimT * -0.16;
  const dashRoll  = dashAnimT *  0.12;

  // ── Apply to gunGroup ─────────────────────────────────────────────
  if (knifeActive || knifePhase !== 'idle') return; // knife owns transform
  if (reloadAnim) return;   // reload animation owns transform
  if (inspectAnim) return;  // inspect animation owns transform
  const isMg   = hasMinigun;
  const baseX  = isMg ? 0.20  : 0.18;
  const baseY  = isMg ? -0.22 : -0.24;
  const baseZ  = isMg ? -0.36 : -0.38;
  const baseRX = isMg ? 0.02  : 0.04;
  const baseRY = isMg ? 0.05  : 0.06;

  gunGroup.position.set(
    baseX + bobX,
    baseY + bobY + jumpLift + landSquish,
    baseZ + dashLean
  );
  gunGroup.rotation.set(
    baseRX + bobRot + jumpTilt + landRot,
    baseRY,
    dashRoll
  );
}


// ─── BULLET TRACER SYSTEM ────────────────────────────────────────────
const TRACER_POOL_SIZE = 24;
const tracerPool = [];

(function initTracers() {
  for (let i = 0; i < TRACER_POOL_SIZE; i++) {
    const geo  = new THREE.BufferGeometry();
    // Two points: origin + end
    const pos  = new Float32Array(6);
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

    const mat  = new THREE.LineBasicMaterial({
      color: 0xffee88,
      transparent: true,
      opacity: 0,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      linewidth: 1,         // only works on some renderers, fallback is 1px
    });

    const line = new THREE.Line(geo, mat);
    line.frustumCulled = false;
    line.visible = false;
    scene.add(line);

    tracerPool.push({ line, life: 0, maxLife: 0 });
  }
})();

function spawnTracer(origin, direction, distance) {
  // Find a dead slot
  const slot = tracerPool.find(t => t.life <= 0);
  if (!slot) return;

  const end = origin.clone().addScaledVector(direction, distance);

  const pos = slot.line.geometry.attributes.position.array;
  pos[0] = origin.x; pos[1] = origin.y; pos[2] = origin.z;
  pos[3] = end.x;    pos[4] = end.y;    pos[5] = end.z;
  slot.line.geometry.attributes.position.needsUpdate = true;

  // AK = yellow-white, minigun = orange-red
  slot.line.material.color.setHex(hasMinigun ? 0xff8822 : 0xfff5aa);
  slot.life    = 1;
  slot.maxLife = hasMinigun ? 0.07 : 0.12;  // minigun tracers shorter-lived
  slot.line.material.opacity = hasMinigun ? 0.9 : 1.0;
  slot.line.visible = true;
}

function updateTracers(dt) {
  for (const t of tracerPool) {
    if (t.life <= 0) continue;
    t.life -= dt / t.maxLife;   // normalised 1→0
    if (t.life <= 0) {
      t.line.visible = false;
      t.line.material.opacity = 0;
      continue;
    }
    // Fade out — fast at first, lingers slightly at start
    t.line.material.opacity = Math.pow(t.life, 0.5) * (hasMinigun ? 0.9 : 1.0);
  }
}

// Helper: get muzzle world position from gunGroup
function getMuzzleWorldPos() {
  // Muzzle is at the tip of the barrel in gunGroup local space
  // AK barrel tip is roughly at local (0, 0, -0.52), minigun slightly different
  const localMuzzle = hasMinigun
    ? new THREE.Vector3(0, 0.04, -0.54)
    : new THREE.Vector3(0, 0.02, -0.52);
  return gunGroup.localToWorld(localMuzzle);
}


function resolveBuildings() {
  const PAD = 0.55; // player radius
  for (const b of buildingColliders) {
    if (camera.position.x > b.minX - PAD && camera.position.x < b.maxX + PAD &&
        camera.position.z > b.minZ - PAD && camera.position.z < b.maxZ + PAD) {
      // Push out on shortest axis
      const overlapLeft  = camera.position.x - (b.minX - PAD);
      const overlapRight = (b.maxX + PAD) - camera.position.x;
      const overlapFront = camera.position.z - (b.minZ - PAD);
      const overlapBack  = (b.maxZ + PAD) - camera.position.z;
      const minOverlap   = Math.min(overlapLeft, overlapRight, overlapFront, overlapBack);
      if (minOverlap === overlapLeft)       camera.position.x = b.minX - PAD;
      else if (minOverlap === overlapRight) camera.position.x = b.maxX + PAD;
      else if (minOverlap === overlapFront) camera.position.z = b.minZ - PAD;
      else                                  camera.position.z = b.maxZ + PAD;
    }
  }
}

function update(dt) {
  if (activeMode !== 'solo' || gamePaused) return;
  updateGamepadSolo(dt);
  updateKnifeAnim(dt);
  updateDog(dt);
  updateTracers(dt);

  // Player movement
  const move = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    move.z -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  move.z += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  move.x -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) move.x += 1;
  if (move.length() > 0) {
    move.normalize().multiplyScalar(dt * 8);
    move.applyEuler(new THREE.Euler(0, rotY, 0));
    camera.position.add(move);
    // Bound
    camera.position.x = Math.max(-60, Math.min(60, camera.position.x));
    camera.position.z = Math.max(-60, Math.min(60, camera.position.z));
    // Building collision (NYC map)
    if (selectedMapId === 'nyc') resolveBuildings();
  }

  // Dash
  if (dashCooldown > 0) dashCooldown -= dt;
  if (dashTimer > 0) {
    dashTimer -= dt;
    const t2 = Math.max(0, dashTimer / DASH_DURATION);
    camera.position.addScaledVector(dashVel, dt * t2);
    camera.position.x = Math.max(-60, Math.min(60, camera.position.x));
    camera.position.z = Math.max(-60, Math.min(60, camera.position.z));
    // Restore FOV smoothly
    camera.fov = 75 + (dashTimer / DASH_DURATION) * 20;
    camera.updateProjectionMatrix();
  } else if (camera.fov !== 75) {
    camera.fov = 75;
    camera.updateProjectionMatrix();
  }

  // Jump / gravity
  velY -= 22 * dt;
  camera.position.y += velY * dt;
  if (camera.position.y <= GROUND_Y) {
    camera.position.y = GROUND_Y;
    velY = 0;
    isGrounded = true;
  }

  // Camera rotation
  yaw.set(pitch, rotY, 0);
  camera.quaternion.setFromEuler(yaw);

  // Gun kick + procedural sway
  const _isMoving  = move.length() > 0 || (dashTimer > 0);
  const _isDashing = dashTimer > 0;
  const _inAir     = !isGrounded;

  updateInspectAnim(dt);
  updateReloadAnim(dt);
  if (gunKickTimer > 0) {
    gunKickTimer -= dt;
    const k = Math.max(0, gunKickTimer / 0.15);
    const isMgK = hasMinigun;
    gunGroup.position.set(isMgK ? 0.20 : 0.18, isMgK ? -0.22 : -0.24, (isMgK ? -0.36 : -0.38) + k * 0.07);
    gunGroup.rotation.set((isMgK ? 0.02 : 0.04) - k * 0.12, isMgK ? 0.05 : 0.06, 0);
  } else if (!reloadAnim && !inspectAnim) {
    updateGunSway(dt, _isMoving, _isDashing, _inAir);
  }

  // Minigun barrel spin
  if (hasMinigun) {
    mgBarrelGroup.rotation.z += dt * 18;
    muzzleGlow.visible = minigunFireTimer < 0.03;
  } else {
    muzzleGlow.visible = false;
  }

  // Fire skin particles
  updateFireParticles(dt);
  updateEmbers(dt);
  updateFireLight(dt);

  // Timer countdown
  timeLeft -= dt;
  updateTimerUI();
  if (timeLeft <= 0) {
    timeLeft = 0;
    endGame('timeout');
    return;
  }

  // Reload
  if (reloading) {
    reloadTimer -= dt;
    if (reloadTimer <= 0) {
      ammo = MAX_AMMO;
      reloading = false;
      updateAmmoUI();
    }
  }

  // Spawn ducks
  if (ducksSpawned < TOTAL_DUCKS) {
    spawnInterval -= dt;
    if (spawnInterval <= 0) {
      spawnDuck();
      ducksSpawned++;
      spawnInterval = 0.8;
    }
  }

  // Update ducks
  const t = clock.getElapsedTime();
  for (const duck of ducks) {
    if (!duck.userData.alive && !duck.userData.dying) continue;

    if (duck.userData.dying) {
      duck.userData.dyingTimer -= dt;
      duck.userData.velocity.y -= 0.003;
      duck.position.add(duck.userData.velocity);
      duck.rotation.z += 0.1;
      if (duck.userData.dyingTimer <= 0 || duck.position.y < -5) {
        scene.remove(duck);
        duck.userData.dying = false;
      }
      continue;
    }

    // Wing flap
    const phase = duck.userData.wingPhase + t * 8;
    for (const child of duck.children) {
      if (child.name === 'wing_r') child.rotation.z = Math.sin(phase) * 0.6;
      if (child.name === 'wing_l') child.rotation.z = -Math.sin(phase) * 0.6;
    }

    // Move
    duck.position.add(duck.userData.velocity);

    // Slight bobbing
    duck.position.y += Math.sin(t * 3 + duck.userData.wingPhase) * 0.005;

    // Face direction of movement
    const vel = duck.userData.velocity;
    if (vel.length() > 0) {
      duck.rotation.y = Math.atan2(vel.x, vel.z);
    }

    // Bounce off world bounds
    if (Math.abs(duck.position.x) > 55) duck.userData.velocity.x *= -1;
    if (Math.abs(duck.position.z) > 55) duck.userData.velocity.z *= -1;
    if (duck.position.y > 20) duck.userData.velocity.y *= -1;
    if (duck.position.y < 2) duck.userData.velocity.y = Math.abs(duck.userData.velocity.y);
  }

  // ── Update orbs (float + rotate + pickup check) ─────────────────────
  for (let i = orbs.length - 1; i >= 0; i--) {
    const orb = orbs[i];
    orb.position.y = orb.userData.baseY + Math.sin(t * 2.5 + i) * 0.18;
    orb.rotation.y += dt * 1.8;
    orb.userData.ring1.rotation.x += dt * 2.2;
    orb.userData.ring2.rotation.z += dt * 1.6;
    orb.userData.light.intensity = 1.2 + Math.sin(t * 4) * 0.4;

    // Pickup check - player walks over it
    const dx = camera.position.x - orb.position.x;
    const dz = camera.position.z - orb.position.z;
    if (Math.sqrt(dx*dx + dz*dz) < 1.4) {
      scene.remove(orb);
      orbs.splice(i, 1);
      hasMinigun = true;
      minigunTimer = MINIGUN_DURATION;
      minigunFireTimer = 0;
      playPickupOrb();
      equipMinigun();
      updateMinigunUI();

      // Show pickup message
      const msg = document.getElementById('kill-msg');
      msg.style.color = '#ff8800';
      msg.style.textShadow = '0 0 20px #ff4400';
      msg.textContent = '🔥 MINIGUN!';
      msg.style.opacity = '1';
      msg.style.transform = 'translateY(-8px)';
      setTimeout(() => {
        msg.style.opacity = '0';
        msg.style.transform = 'translateY(0)';
        msg.style.color = '#ff6b35';
        msg.style.textShadow = '0 0 10px #ff6b35';
        msg.textContent = '+10 PTS';
      }, 1200);
    }
  }

  // ── Minigun auto-fire ────────────────────────────────────────────────
  if (hasMinigun) {
    if (minigunTimer !== Infinity) minigunTimer -= dt;
    updateMinigunUI();
    if (minigunTimer <= 0) {
      hasMinigun = false;
      minigunTimer = 0;
      updateMinigunUI();
      equipAK();
      playMinigunEnd();
    } else {
      minigunFireTimer -= dt;
      if (minigunFireTimer <= 0) {
        minigunFireTimer = MINIGUN_FIRERATE;
        // Auto-shoot without consuming ammo
        playMinigunShot();
        gsap_kickGun();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        // Minigun tracer — slight random spread per shot
        {
          const spread = 0.018;
          const muzzle = getMuzzleWorldPos();
          const baseDir = raycaster.ray.direction.clone();
          baseDir.x += (Math.random()-0.5)*spread;
          baseDir.y += (Math.random()-0.5)*spread;
          baseDir.normalize();
          spawnTracer(muzzle, baseDir, 80);
        }
        let hit = null, closestDist = Infinity;
        for (const duck of ducks) {
          if (!duck.userData.alive) continue;
          const sphere = new THREE.Sphere(duck.position, duck.userData.radius);
          const pt = new THREE.Vector3();
          if (raycaster.ray.intersectSphere(sphere, pt)) {
            const d = camera.position.distanceTo(duck.position);
            if (d < closestDist) { closestDist = d; hit = duck; }
          }
        }
        if (hit) killDuck(hit);
      }
    }
  }

  // Update feathers
  for (let i = feathers.length - 1; i >= 0; i--) {
    const f = feathers[i];
    f.life -= dt;
    f.vel.y -= 0.004;
    f.mesh.position.add(f.vel);
    f.mesh.rotation.z += 0.08;
    f.mesh.material.opacity = Math.max(0, f.life / 1.5);
    f.mesh.material.transparent = true;
    if (f.life <= 0) {
      scene.remove(f.mesh);
      feathers.splice(i, 1);
    }
  }
}

// ── Single source of truth for active mode ────────────────────────
// Values: 'none' | 'solo' | 'coop'
let activeMode = 'none';

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (activeMode === 'coop') {
    updateCoop(dt);
    renderCoop();
  } else if (activeMode === 'solo') {
    update(dt);
    renderer.setScissorTest(false);
    renderer.setViewport(0, 0, innerWidth, innerHeight);
    renderer.render(scene, camera);
  } else {
    // Menu — just render the scene quietly
    renderer.setScissorTest(false);
    renderer.setViewport(0, 0, innerWidth, innerHeight);
    renderer.render(scene, camera);
  }
}
animate();

// ─── PAUSE ───────────────────────────────────────────────────────────
function pauseGame() {
  gamePaused = true;
  document.exitPointerLock && document.exitPointerLock();
  // Update pause stats
  document.getElementById('pause-score').textContent = score;
  document.getElementById('pause-killed').textContent = killed;
  document.getElementById('pause-time').textContent = document.getElementById('timer-display').textContent;
  const p = document.getElementById('pause-overlay');
  p.style.display = 'flex';
  // Re-trigger panel animation
  const panel = document.getElementById('pause-panel');
  panel.style.animation = 'none';
  panel.offsetHeight; // reflow
  panel.style.animation = '';
}

function resumeGame() {
  gamePaused = false;
  document.getElementById('pause-overlay').style.display = 'none';
  canvas.requestPointerLock();
}

function restartFromPause() {
  document.getElementById('pause-overlay').style.display = 'none';
  if (activeMode === 'coop') startCoop();
  else startGame();
}

// ─── SCOREBOARD ──────────────────────────────────────────────────────
const SCORE_KEY = 'duckhunt3d_scores';

function saveScore(pts, kills, timeUsed, mode) {
  const scores = loadScores();
  scores.push({
    pts, kills,
    time: Math.floor(timeUsed),
    mode: mode || 'solo',
    date: new Date().toLocaleDateString('es-UY', { day:'2-digit', month:'2-digit', year:'2-digit' })
  });
  scores.sort((a, b) => b.pts - a.pts);
  const top = scores.slice(0, 10);
  try { localStorage.setItem(SCORE_KEY, JSON.stringify(top)); } catch(e) {}
  return top;
}

function loadScores() {
  try { return JSON.parse(localStorage.getItem(SCORE_KEY) || '[]'); } catch(e) { return []; }
}

function clearScores() {
  try { localStorage.removeItem(SCORE_KEY); } catch(e) {}
}

function renderScoreboard() {
  const scores = loadScores();
  if (scores.length === 0) {
    return `<div style="text-align:center;color:rgba(255,255,255,0.2);font-size:10px;letter-spacing:3px;padding:24px 0;font-family:'Inter',sans-serif;">SIN PARTIDAS AÚN</div>`;
  }
  return scores.map((s, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `<span style="font-size:9px;color:rgba(255,255,255,0.25);font-family:'Inter',sans-serif">#${i+1}</span>`;
    const modeColor = s.mode === 'coop' ? '#44aaff' : '#ffcc02';
    const modeLabel = s.mode === 'coop' ? 'CO' : 'S1';
    const mins = Math.floor(s.time / 60), secs = s.time % 60;
    return `
      <div style="display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;background:${i===0?'rgba(255,200,0,0.06)':'rgba(255,255,255,0.02)'}; ${i===0?'border:1px solid rgba(255,200,0,0.12);':'border:1px solid transparent;'}">
        <div style="width:20px;text-align:center;font-size:12px;line-height:1;">${medal}</div>
        <div style="flex:1;font-family:'Bebas Neue',sans-serif;font-size:18px;color:${i===0?'#ffcc02':'#fff'};letter-spacing:1px;line-height:1;">${s.pts}<span style="font-size:10px;color:rgba(255,255,255,0.25);font-family:'Inter',sans-serif;margin-left:2px;">pts</span></div>
        <div style="font-size:8px;color:rgba(255,255,255,0.28);font-family:'Inter',sans-serif;">${s.kills}🦆</div>
        <div style="font-size:8px;color:rgba(255,255,255,0.28);font-family:'Inter',sans-serif;">${mins}:${String(secs).padStart(2,'0')}</div>
        <div style="font-size:7px;font-weight:700;letter-spacing:1px;color:${modeColor};padding:2px 4px;border:1px solid ${modeColor}44;border-radius:3px;font-family:'Inter',sans-serif;">${modeLabel}</div>
      </div>`;
  }).join('');
}

// ─── ADMIN CHEAT CODE ────────────────────────────────────────────────
let adminCheat  = false;
let cheatBuffer = '';
document.addEventListener('keydown', e => {
  if (!document.getElementById('screen-overlay') ||
      document.getElementById('screen-overlay').style.display === 'none') return;
  cheatBuffer = (cheatBuffer + e.key.toLowerCase()).slice(-5);
  if (cheatBuffer === 'admin') {
    adminCheat = !adminCheat;
    cheatBuffer = '';
    // Flash the cheat badge
    const badge = document.getElementById('cheat-badge');
    if (badge) {
      badge.style.opacity = '1';
      badge.style.transform = 'scale(1.15)';
      badge.textContent = adminCheat ? '💀 MODO ADMIN ACTIVADO' : '🔒 MODO ADMIN DESACTIVADO';
      badge.style.color = adminCheat ? '#ff4444' : 'rgba(255,255,255,0.3)';
      badge.style.borderColor = adminCheat ? 'rgba(255,50,50,0.4)' : 'rgba(255,255,255,0.1)';
      setTimeout(() => { badge.style.transform = 'scale(1)'; }, 200);
    }
  }
  if (cheatBuffer.slice(-4) === 'fire') {
    fireUnlocked = !fireUnlocked;
    cheatBuffer  = '';
    try { fireUnlocked ? localStorage.setItem('fire_unlocked','1') : localStorage.removeItem('fire_unlocked'); } catch(e) {}
    const _ft = document.createElement('div');
    _ft.textContent = fireUnlocked ? '\uD83D\uDD25 SKIN INFERNO DESBLOQUEADA' : '\uD83D\uDD25 SKIN INFERNO BLOQUEADA';
    _ft.style.cssText = "position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:5px;color:#ff6600;background:rgba(0,0,0,0.88);border:1px solid rgba(255,100,0,0.4);padding:10px 28px;border-radius:4px;z-index:9999;pointer-events:none;transition:opacity 0.5s";
    document.body.appendChild(_ft);
    setTimeout(() => { _ft.style.opacity='0'; setTimeout(()=>_ft.remove(),500); }, 2000);
    if (document.getElementById('skin-cards')) buildSkinMenu();
  }
});

// ═══════════════════════════════════════════════════════════════════
// ─── GAMEPAD / PS5 DUALSENSE SUPPORT ────────────────────────────────
// ═══════════════════════════════════════════════════════════════════
//
// PS5 DualSense button mapping (Gamepad API standard):
//   0  = Cross (✕)        → Jump / Confirm
//   1  = Circle (○)       → Reload
//   2  = Square (□)       → Dash
//   3  = Triangle (△)     → (unused)
//   4  = L1               → (unused)
//   5  = R1               → Shoot
//   6  = L2               → Shoot (analog trigger)
//   7  = R2               → Shoot (analog trigger)
//   8  = Share
//   9  = Options          → Pause
//  10  = L3 (stick click)
//  11  = R3 (stick click)
//  12  = D-Pad Up
//  13  = D-Pad Down
//  14  = D-Pad Left
//  15  = D-Pad Right
//
// Axes:
//   0 = Left stick X  → Move left/right
//   1 = Left stick Y  → Move forward/back
//   2 = Right stick X → Look left/right
//   3 = Right stick Y → Look up/down

const DEADZONE = 0.12;
const GP_LOOK_SENS = 1.8; // degrees per frame at full deflection

// Track per-controller button states to detect rising edges
const gpPrev = [{}, {}];

function getGamepads() {
  return Array.from(navigator.getGamepads ? navigator.getGamepads() : []).filter(Boolean);
}

function gpAxis(gp, axis) {
  const v = gp.axes[axis] ?? 0;
  return Math.abs(v) > DEADZONE ? v : 0;
}

function gpBtn(gp, idx) {
  const b = gp.buttons[idx];
  return b ? (typeof b === 'object' ? b.pressed || b.value > 0.2 : b) : false;
}

function gpBtnJustPressed(gpIndex, btnIndex) {
  const gp = getGamepads()[gpIndex];
  if (!gp) return false;
  const cur = gpBtn(gp, btnIndex);
  const prev = gpPrev[gpIndex][btnIndex] || false;
  gpPrev[gpIndex][btnIndex] = cur;
  return cur && !prev;
}

// Show connection toast
window.addEventListener('gamepadconnected', e => {
  const name = e.gamepad.id.toLowerCase();
  const isPS = name.includes('dualsense') || name.includes('playstation') || name.includes('054c');
  showToast(`🎮 ${isPS ? 'DualSense PS5' : 'Control'} conectado (P${e.gamepad.index + 1})`);
});
window.addEventListener('gamepaddisconnected', e => {
  showToast(`🎮 Control P${e.gamepad.index + 1} desconectado`);
});

function showToast(msg) {
  let t = document.getElementById('gp-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'gp-toast';
    t.style.cssText = `
      position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(8px); color:#fff; font-family:'Inter',sans-serif;
      font-size:12px; letter-spacing:2px; padding:9px 20px; border-radius:20px;
      z-index:50; transition:opacity 0.4s; pointer-events:none;
    `;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

// ── Solo mode gamepad update (called from update loop) ────────────
function updateGamepadSolo(dt) {
  const gp = getGamepads()[0];
  if (!gp) return;

  // ── Movement — left stick ──────────────────────────────────────
  const lx = gpAxis(gp, 0);
  const ly = gpAxis(gp, 1);
  if (lx !== 0 || ly !== 0) {
    const move = new THREE.Vector3(lx, 0, ly).normalize().multiplyScalar(dt * 8);
    move.applyEuler(new THREE.Euler(0, rotY, 0));
    camera.position.add(move);
    camera.position.x = Math.max(-60, Math.min(60, camera.position.x));
    camera.position.z = Math.max(-60, Math.min(60, camera.position.z));
  }

  // ── Look — right stick ─────────────────────────────────────────
  const rx = gpAxis(gp, 2);
  const ry = gpAxis(gp, 3);
  rotY  -= rx * dt * GP_LOOK_SENS;
  pitch  = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch - ry * dt * GP_LOOK_SENS));

  // ── Shoot — R2 or R1 (rising edge) ────────────────────────────
  if (gpBtnJustPressed(0, 7) || gpBtnJustPressed(0, 5)) shoot();

  // ── Reload — Circle (1) ────────────────────────────────────────
  if (gpBtnJustPressed(0, 1)) reload();

  // ── Jump — Cross (0) ──────────────────────────────────────────
  if (gpBtnJustPressed(0, 0) && isGrounded) {
    velY = 8; isGrounded = false; playJump();
  }

  // ── Dash — Square (2) ─────────────────────────────────────────
  if (gpBtnJustPressed(0, 2) && dashCooldown <= 0) {
    const dir = new THREE.Vector3(lx || 0, 0, ly || -1).normalize();
    dir.applyEuler(new THREE.Euler(0, rotY, 0));
    dashVel.copy(dir.multiplyScalar(DASH_SPEED));
    dashTimer = DASH_DURATION; dashCooldown = DASH_COOLDOWN;
    playDash(); camera.fov = 95; camera.updateProjectionMatrix();
  }

  // ── Pause — Options (9) ───────────────────────────────────────
  if (gpBtnJustPressed(0, 9)) {
    gamePaused ? resumeGame() : pauseGame();
  }

  // ── D-Pad also moves ──────────────────────────────────────────
  if (gpBtn(gp, 12)) { const m = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,rotY,0)).multiplyScalar(dt*8); camera.position.add(m); }
  if (gpBtn(gp, 13)) { const m = new THREE.Vector3(0,0, 1).applyEuler(new THREE.Euler(0,rotY,0)).multiplyScalar(dt*8); camera.position.add(m); }
  if (gpBtn(gp, 14)) { const m = new THREE.Vector3(-1,0,0).applyEuler(new THREE.Euler(0,rotY,0)).multiplyScalar(dt*8); camera.position.add(m); }
  if (gpBtn(gp, 15)) { const m = new THREE.Vector3( 1,0,0).applyEuler(new THREE.Euler(0,rotY,0)).multiplyScalar(dt*8); camera.position.add(m); }
}

// ── Coop mode gamepad update (called from updateCoop) ────────────
function updateGamepadCoop(dt) {
  const gps = getGamepads();

  players.forEach((p, idx) => {
    const gp = gps[idx];
    if (!gp) return;

    // ── Movement — left stick ────────────────────────────────────
    const lx = gpAxis(gp, 0);
    const ly = gpAxis(gp, 1);
    if (lx !== 0 || ly !== 0) {
      const move = new THREE.Vector3(lx, 0, ly).normalize().multiplyScalar(dt * 8);
      move.applyEuler(new THREE.Euler(0, p.rotY, 0));
      p.cam.position.add(move);
      p.cam.position.x = Math.max(-60, Math.min(60, p.cam.position.x));
      p.cam.position.z = Math.max(-60, Math.min(60, p.cam.position.z));
    }

    // ── Look — right stick ───────────────────────────────────────
    const rx = gpAxis(gp, 2);
    const ry = gpAxis(gp, 3);
    p.rotY  -= rx * dt * GP_LOOK_SENS;
    p.pitch  = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, p.pitch - ry * dt * GP_LOOK_SENS));

    // ── Shoot — R2 or R1 ─────────────────────────────────────────
    if (gpBtnJustPressed(idx, 7) || gpBtnJustPressed(idx, 5)) coopShoot(p);

    // ── Reload — Circle (1) ──────────────────────────────────────
    if (gpBtnJustPressed(idx, 1)) coopReload(p);

    // ── Jump — Cross (0) ─────────────────────────────────────────
    if (gpBtnJustPressed(idx, 0) && p.isGrounded) {
      p.velY = 8; p.isGrounded = false; playJump();
    }

    // ── Dash — Square (2) ────────────────────────────────────────
    if (gpBtnJustPressed(idx, 2) && p.dashCooldown <= 0) {
      const dir = new THREE.Vector3(lx || 0, 0, ly || -1).normalize();
      dir.applyEuler(new THREE.Euler(0, p.rotY, 0));
      p.dashVel.copy(dir.multiplyScalar(28));
      p.dashTimer = 0.18; p.dashCooldown = 1.0;
      playDash(); p.cam.fov = 95; p.cam.updateProjectionMatrix();
    }

    // ── Pause — Options (9) ──────────────────────────────────────
    if (gpBtnJustPressed(idx, 9)) {
      coopPaused ? coopResume() : coopPause();
    }
  });
}

function createPlayerCharacter(color) {
  const g = new THREE.Group();
  const matBody   = new THREE.MeshLambertMaterial({ color });
  const matSkin   = new THREE.MeshLambertMaterial({ color: 0xf5cba7 });
  const matDark   = new THREE.MeshLambertMaterial({ color: 0x222222 });

  // Legs
  const legData = [];
  for (const sx of [-0.11, 0.11]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.42, 0.18), matDark);
    leg.position.set(sx, -0.55, 0);
    g.add(leg);
    legData.push(leg);
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.1, 0.24), matShoes);
    shoe.position.set(sx, -0.80, 0.03);
    g.add(shoe);
  }
  g.userData.legL = legData[0];
  g.userData.legR = legData[1];

  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.52, 0.24), matBody);
  torso.position.set(0, -0.10, 0);
  g.add(torso);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.34, 0.34), matSkin);
  head.position.set(0, 0.38, 0);
  g.add(head);

  // Eyes
  for (const ex of [-0.08, 0.08]) {
    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.07, 0.04), matDark);
    eye.position.set(ex, 0.42, 0.17);
    g.add(eye);
  }

  // Arms
  for (const sx of [-0.30, 0.30]) {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.40, 0.14), matBody);
    arm.position.set(sx, -0.08, 0);
    g.add(arm);
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.14, 0.13), matSkin);
    hand.position.set(sx, -0.30, 0);
    g.add(hand);
  }

  // Gun held in right hand
  const gBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.42), matGun);
  gBarrel.position.set(0.30, -0.28, -0.22);
  g.add(gBarrel);
  const gStock = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.10, 0.18), new THREE.MeshLambertMaterial({color:0x6b3a1f}));
  gStock.position.set(0.30, -0.24, 0.02);
  g.add(gStock);

  g.position.y = 0; // will be set to cam.y - 1.7 each frame
  return g;
}

// ── Input maps ────────────────────────────────────────────────────
const coopKeys = {};
document.addEventListener('keydown', e => {
  coopKeys[e.code] = true;
  if (e.code === 'Escape' && coopRunning) {
    coopPaused ? coopResume() : coopPause();
  }
  // P1 jump
  if (e.code === 'Space' && coopRunning && !coopPaused && players[0].isGrounded) {
    players[0].velY = 8; players[0].isGrounded = false; playJump();
  }
  // P2 jump (L key)
  if (e.code === 'KeyL' && coopRunning && !coopPaused && players[1].isGrounded) {
    players[1].velY = 8; players[1].isGrounded = false; playJump();
  }
  // P1 dash
  if ((e.code === 'ShiftLeft'||e.code === 'ShiftRight') && coopRunning && !coopPaused && players[0].dashCooldown <= 0) {
    coopDash(players[0], ['KeyW','KeyS','KeyA','KeyD']);
  }
  // P2 shoot (U)
  if (e.code === 'KeyU' && coopRunning && !coopPaused) {
    coopShoot(players[1]);
  }
  // P2 reload (O)
  if (e.code === 'KeyO' && coopRunning && !coopPaused) {
    coopReload(players[1]);
  }
  // P2 dash (P)
  if (e.code === 'KeyP' && coopRunning && !coopPaused && players[1].dashCooldown <= 0) {
    coopDash(players[1], ['KeyI','KeyK','KeyJ','KeyL']);
  }
});
document.addEventListener('keyup', e => { coopKeys[e.code] = false; });

// P1 shoot on mouse click (left half - but we just check click when coop active)
document.addEventListener('mousedown', e => {
  if (!coopRunning || coopPaused) return;
  if (e.button === 0) coopShoot(players[0]);
  if (e.button === 2) coopReload(players[0]);
});

// Mouse look for P1
document.addEventListener('mousemove', e => {
  if (!coopRunning || coopPaused) return;
  const sens = 0.002;
  players[0].rotY  -= e.movementX * sens;
  players[0].pitch  = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, players[0].pitch - e.movementY * sens));
});

// ── Coop helpers ──────────────────────────────────────────────────
const coopRaycaster = new THREE.Raycaster();

function coopShoot(p) {
  if (p.ammo <= 0 || p.reloading) return;
  p.ammo--;
  p.gunKickTimer = 0.15;
  updateCoopAmmo(p);
  playShoot();

  coopRaycaster.setFromCamera(new THREE.Vector2(0, 0), p.cam);
  let hit = null, closestDist = Infinity;
  for (const duck of coopDucks) {
    if (!duck.userData.alive) continue;
    const sphere = new THREE.Sphere(duck.position, 0.6);
    const pt = new THREE.Vector3();
    if (coopRaycaster.ray.intersectSphere(sphere, pt)) {
      const d = p.cam.position.distanceTo(duck.position);
      if (d < closestDist) { closestDist = d; hit = duck; }
    }
  }
  if (hit) coopKillDuck(hit, p);
  if (p.ammo === 0) setTimeout(() => coopReload(p), 300);
}

function coopReload(p) {
  if (p.reloading || p.ammo === 6) return;
  p.reloading = true; p.reloadTimer = 1.2;
  playReload();
}

function coopDash(p, moveCodes) {
  const [fw, bk, lt, rt] = moveCodes;
  const dir = new THREE.Vector3();
  if (coopKeys[fw]) dir.z -= 1;
  if (coopKeys[bk]) dir.z += 1;
  if (coopKeys[lt]) dir.x -= 1;
  if (coopKeys[rt]) dir.x += 1;
  if (dir.length() === 0) dir.z = -1;
  dir.normalize().applyEuler(new THREE.Euler(0, p.rotY, 0));
  p.dashVel.copy(dir.multiplyScalar(28));
  p.dashTimer = 0.18; p.dashCooldown = 1.0;
  playDash();
  p.cam.fov = 95; p.cam.updateProjectionMatrix();
}

function coopKillDuck(duck, scorer) {
  duck.userData.alive = false;
  duck.userData.dying = true;
  duck.userData.dyingTimer = 1.2;
  duck.userData.velocity.y = -0.05;
  duck.userData.velocity.x *= 0.5;
  duck.userData.velocity.z *= 0.5;
  spawnFeathers(duck.position.clone());
  scorer.score += 10;
  scorer.kills++;
  updateCoopHUD();
  const totalKills = players[0].kills + players[1].kills;
  if (totalKills >= COOP_TOTAL_DUCKS) coopEndGame('complete');
}

function updateCoopHUD() {
  const p1 = players[0], p2 = players[1];
  document.getElementById('cp1-score').textContent = p1.score;
  document.getElementById('cp1-kills').innerHTML = p1.kills + '<span style="font-size:12px;opacity:0.4">/100</span>';
  document.getElementById('cp2-score').textContent = p2.score;
  document.getElementById('cp2-kills').innerHTML = p2.kills + '<span style="font-size:12px;opacity:0.4">/100</span>';
}

function updateCoopAmmo(p) {
  const id = p === players[0] ? 'cp1-ammo' : 'cp2-ammo';
  const cls = p.ammoClass;
  const el = document.getElementById(id);
  el.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const pip = document.createElement('div');
    pip.className = `coop-pip ${i < p.ammo ? cls+'-full' : cls+'-empty'}`;
    el.appendChild(pip);
  }
}

function updateCoopTimer() {
  const m = Math.floor(coopTimeLeft / 60);
  const s = Math.floor(coopTimeLeft % 60);
  const el = document.getElementById('coop-timer');
  el.textContent = m + ':' + String(s).padStart(2,'0');
  if (coopTimeLeft <= 30) {
    el.style.color = '#ff4444';
    if (!coopWarningPlayed) { coopWarningPlayed = true; playTimerWarning(); }
  } else {
    el.style.color = 'rgba(255,255,255,0.7)';
  }
}

// ── Coop spawn ────────────────────────────────────────────────────
function spawnCoopDuck() {
  const duck = createDuck();
  const angle = Math.random() * Math.PI * 2;
  const dist  = Math.random() * 30 + 15;
  duck.position.set(Math.cos(angle)*dist, Math.random()*10+3, Math.sin(angle)*dist);
  const speed = Math.random()*0.04+0.02;
  duck.userData = {
    velocity: new THREE.Vector3((Math.random()-.5),(Math.random()-.5)*0.2,(Math.random()-.5)).normalize().multiplyScalar(speed),
    wingPhase: Math.random()*Math.PI*2, radius: 0.6, alive: true
  };
  scene.add(duck);
  coopDucks.push(duck);
}

// ── Coop update loop ──────────────────────────────────────────────
function updateCoop(dt) {
  if (activeMode !== 'coop' || coopPaused) return;
  updateGamepadCoop(dt);
  updateDog(dt);

  // Timer
  coopTimeLeft -= dt;
  updateCoopTimer();
  if (coopTimeLeft <= 0) { coopTimeLeft = 0; coopEndGame('timeout'); return; }

  // Spawn
  if (coopDucksSpawned < COOP_TOTAL_DUCKS) {
    coopSpawnInterval -= dt;
    if (coopSpawnInterval <= 0) { spawnCoopDuck(); coopDucksSpawned++; coopSpawnInterval = 0.7; }
  }

  // Update ducks (shared world)
  const t = clock.getElapsedTime();
  for (const duck of coopDucks) {
    if (!duck.userData.alive && !duck.userData.dying) continue;
    if (duck.userData.dying) {
      duck.userData.dyingTimer -= dt;
      duck.userData.velocity.y -= 0.003;
      duck.position.add(duck.userData.velocity);
      duck.rotation.z += 0.1;
      if (duck.userData.dyingTimer <= 0 || duck.position.y < -5) { scene.remove(duck); duck.userData.dying = false; }
      continue;
    }
    const phase = duck.userData.wingPhase + t * 8;
    for (const child of duck.children) {
      if (child.name === 'wing_r') child.rotation.z = Math.sin(phase)*0.6;
      if (child.name === 'wing_l') child.rotation.z = -Math.sin(phase)*0.6;
    }
    duck.position.add(duck.userData.velocity);
    duck.position.y += Math.sin(t*3+duck.userData.wingPhase)*0.005;
    if (Math.abs(duck.position.x)>55) duck.userData.velocity.x*=-1;
    if (Math.abs(duck.position.z)>55) duck.userData.velocity.z*=-1;
    if (duck.position.y>20) duck.userData.velocity.y*=-1;
    if (duck.position.y<2) duck.userData.velocity.y=Math.abs(duck.userData.velocity.y);
  }

  // Update each player
  players.forEach((p, idx) => {
    const moveCodes = idx === 0
      ? { f:'KeyW', b:'KeyS', l:'KeyA', r:'KeyD' }
      : { f:'KeyI', b:'KeyK', l:'KeyJ', r:'KeyL' };

    // Move
    const move = new THREE.Vector3();
    if (coopKeys[moveCodes.f]) move.z -= 1;
    if (coopKeys[moveCodes.b]) move.z += 1;
    if (coopKeys[moveCodes.l]) move.x -= 1;
    if (coopKeys[moveCodes.r]) move.x += 1;
    if (move.length() > 0) {
      move.normalize().multiplyScalar(dt * 8).applyEuler(new THREE.Euler(0, p.rotY, 0));
      p.cam.position.add(move);
      p.cam.position.x = Math.max(-60, Math.min(60, p.cam.position.x));
      p.cam.position.z = Math.max(-60, Math.min(60, p.cam.position.z));
    }

    // Dash
    if (p.dashCooldown > 0) p.dashCooldown -= dt;
    if (p.dashTimer > 0) {
      p.dashTimer -= dt;
      const t2 = Math.max(0, p.dashTimer/0.18);
      p.cam.position.addScaledVector(p.dashVel, dt*t2);
      p.cam.fov = 75 + t2*20; p.cam.updateProjectionMatrix();
    } else if (p.cam.fov !== 75) { p.cam.fov = 75; p.cam.updateProjectionMatrix(); }

    // Jump/gravity
    p.velY -= 22 * dt;
    p.cam.position.y += p.velY * dt;
    if (p.cam.position.y <= 1.7) { p.cam.position.y = 1.7; p.velY = 0; p.isGrounded = true; }

    // Camera look (P1: mouse, P2: fixed horizontal look with keys — no mouse)
    if (idx === 1) {
      // P2 look left/right with Q and E (bonus)
      if (coopKeys['KeyQ']) p.rotY += dt * 1.8;
      if (coopKeys['KeyE']) p.rotY -= dt * 1.8;
    }
    p.cam.quaternion.setFromEuler(new THREE.Euler(p.pitch, p.rotY, 0, 'YXZ'));

    // Gun kick
    if (p.gunKickTimer > 0) {
      p.gunKickTimer -= dt;
      const k = Math.max(0, p.gunKickTimer/0.15);
      p.gun.position.z = -0.38 + k*0.07;
      p.gun.rotation.x = 0.04 - k*0.12;
    } else { p.gun.position.z = -0.38; p.gun.rotation.x = 0.04; }

    // Reload
    if (p.reloading) {
      p.reloadTimer -= dt;
      if (p.reloadTimer <= 0) { p.ammo = 6; p.reloading = false; updateCoopAmmo(p); }
    }
  });

  // Update crosshair positions
  document.getElementById('ch-p1').style.cssText = `
    display:block; left:calc(50% - 18px); top:25vh; transform:translateY(-50%);`;
  document.getElementById('ch-p2').style.cssText = `
    display:block; left:calc(50% - 18px); top:75vh; transform:translateY(-50%);`;

  // Sync character bodies to camera positions with walk animation
  const tElapsed = clock.getElapsedTime();
  [char1, char2].forEach((ch, idx) => {
    const p = players[idx];
    // Camera is at eye height (1.7). Character feet bottom at y = group_center - 0.85.
    // So to put feet at world y=0: group_y = groundY + 0.85
    const groundY = p.cam.position.y - 1.7; // 0 when standing on ground
    ch.position.set(p.cam.position.x, groundY + 0.85, p.cam.position.z);
    ch.rotation.y = p.rotY + Math.PI; // face forward

    // Walk bob — only animate legs/arms if moving
    const moving = (idx === 0)
      ? (coopKeys['KeyW']||coopKeys['KeyS']||coopKeys['KeyA']||coopKeys['KeyD'])
      : (coopKeys['KeyI']||coopKeys['KeyK']||coopKeys['KeyJ']||coopKeys['KeyL']);
    const walkCycle = moving ? Math.sin(tElapsed * 9) : 0;
    if (ch.userData && ch.userData.legL) {
      ch.userData.legL.rotation.x =  walkCycle * 0.4;
      ch.userData.legR.rotation.x = -walkCycle * 0.4;
    }
  });
}

// ── Coop render ───────────────────────────────────────────────────
function renderCoop() {
  if (!coopRunning) return;
  const W = renderer.domElement.width;
  const H = renderer.domElement.height;
  const half = Math.floor(H / 2);

  // Always hide the solo gunGroup in coop
  gunGroup.visible = false;

  renderer.setScissorTest(true);

  // ── Top half — Player 1 view ──────────────────────────────────
  // P1 sees: own FP gun, P2's character. Hide own character.
  gun1.visible = true;
  gun2.visible = false;
  char1.visible = false;
  char2.visible = true;

  renderer.setViewport(0, half, W, half);
  renderer.setScissor(0, half, W, half);
  cam1.aspect = W / half;
  cam1.updateProjectionMatrix();
  renderer.render(scene, cam1);

  // ── Bottom half — Player 2 view ───────────────────────────────
  // P2 sees: own FP gun, P1's character. Hide own character.
  gun1.visible = false;
  gun2.visible = true;
  char1.visible = true;
  char2.visible = false;

  renderer.setViewport(0, 0, W, half);
  renderer.setScissor(0, 0, W, half);
  cam2.aspect = W / half;
  cam2.updateProjectionMatrix();
  renderer.render(scene, cam2);

  renderer.setScissorTest(false);
}

// ── Coop pause ────────────────────────────────────────────────────
function coopPause() {
  coopPaused = true;
  document.exitPointerLock && document.exitPointerLock();
  document.getElementById('pause-score').textContent = `P1: ${players[0].score} · P2: ${players[1].score}`;
  document.getElementById('pause-killed').textContent = players[0].kills + players[1].kills;
  document.getElementById('pause-time').textContent = document.getElementById('coop-timer').textContent;
  const p = document.getElementById('pause-overlay');
  p.style.display = 'flex';
  const panel = document.getElementById('pause-panel');
  panel.style.animation = 'none'; panel.offsetHeight; panel.style.animation = '';
}

function coopResume() {
  coopPaused = false;
  document.getElementById('pause-overlay').style.display = 'none';
  canvas.requestPointerLock();
}

// restartFromPause is defined above (mode-aware)

// ── Coop start ────────────────────────────────────────────────────
function startCoop() {
  // ── Atomically stop any other mode first ──────────────────────
  activeMode  = 'none';
  gameRunning = false;
  gamePaused  = false;
  coopRunning = false;
  coopPaused  = false;

  // Clean up solo leftovers
  for (const d of ducks) scene.remove(d);
  ducks.length = 0;
  for (const o of orbs) scene.remove(o);
  orbs.length = 0;
  hasMinigun = false; minigunTimer = 0; minigunFireTimer = 0;
  equipAK(); updateMinigunUI();

  // Hide solo UI, show coop UI
  document.getElementById('screen-overlay').style.display = 'none';
  document.getElementById('ui').style.display = 'none';
  document.getElementById('progress-bar').style.display = 'none';
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('coop-hud').style.display = 'block';
  document.getElementById('coop-divider').style.display = 'block';
  document.getElementById('coop-timer').style.display = 'block';
  document.getElementById('ch-p1').style.display = 'block';
  document.getElementById('ch-p2').style.display = 'block';

  // Reset state
  coopRunning = true; coopPaused = false;
  coopTimeLeft = 120; coopWarningPlayed = false;
  coopDucksSpawned = 0; coopSpawnInterval = 0.5;

  // Hide solo mode gun (it's a child of solo camera, but camera is in scene)
  gunGroup.visible = false;

  // Show player characters and guns
  char1.visible = true; char2.visible = true;
  gun1.visible = true;  gun2.visible = true;

  // Reset ducks
  for (const d of coopDucks) scene.remove(d);
  coopDucks.length = 0;

  // Reset players
  players[0].cam.position.set(-3, 1.7, 0);  players[0].rotY = 0;    players[0].pitch = 0;
  players[1].cam.position.set( 3, 1.7, 5);  players[1].rotY = Math.PI; players[1].pitch = 0;
  players.forEach(p => {
    p.score=0; p.kills=0; p.ammo=6; p.reloading=false; p.reloadTimer=0;
    p.velY=0; p.isGrounded=true; p.dashTimer=0; p.dashCooldown=0;
    p.dashVel.set(0,0,0); p.gunKickTimer=0; p.hasMinigun=false;
    p.gun.position.set(0.18,-0.24,-0.38); p.gun.rotation.set(0.04,0.06,0);
    updateCoopAmmo(p);
  });
  updateCoopHUD();
  updateCoopTimer();
  canvas.requestPointerLock();

  // Engage coop loop last, after everything is ready
  coopRunning = true;
  gunGroup.visible = false;
  char1.visible = false;
  char2.visible = false;
  activeMode = 'coop';
}

// ── Coop end ─────────────────────────────────────────────────────
function coopEndGame(reason) {
  if (!coopRunning) return;
  activeMode  = 'none';
  coopRunning = false;
  document.exitPointerLock && document.exitPointerLock();
  gun1.visible = false; gun2.visible = false;
  char1.visible = false; char2.visible = false;
  gunGroup.visible = true;
  char1.visible = false; char2.visible = false;
  gunGroup.visible = true;

  // Hide coop HUD
  document.getElementById('coop-hud').style.display = 'none';
  document.getElementById('coop-divider').style.display = 'none';
  document.getElementById('coop-timer').style.display = 'none';
  document.getElementById('ch-p1').style.display = 'none';
  document.getElementById('ch-p2').style.display = 'none';

  const p1 = players[0], p2 = players[1];
  const winner = p1.score > p2.score ? 'P1' : p2.score > p1.score ? 'P2' : 'EMPATE';
  const winColor = winner === 'P1' ? '#ffcc02' : winner === 'P2' ? '#44aaff' : '#aaa';
  const timedOut = reason === 'timeout';
  const timeUsedCoop = 120 - coopTimeLeft;

  // Save both player scores
  saveScore(p1.score, p1.kills, timeUsedCoop, 'coop');
  saveScore(p2.score, p2.kills, timeUsedCoop, 'coop');

  const overlay = document.getElementById('screen-overlay');
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <div id="overlay-bg"></div>
    <div id="overlay-grid"></div>
    <div id="overlay-scan"></div>
    <div id="overlay-vignette"></div>
    <div id="overlay-content" style="flex-direction:column;align-items:center;justify-content:center;padding:clamp(32px,5vh,64px) clamp(24px,4vw,48px)">
      <div class="menu-badge" style="color:${winColor}; border-color:${winColor}44; background:${winColor}11">
        ${timedOut ? '⏱ Tiempo agotado' : '🏁 Partida terminada'} · COOP
      </div>
      <div class="end-title" style="color:${winColor}; text-shadow:0 0 60px ${winColor}88">
        ${winner === 'EMPATE' ? 'EMPATE' : winner + ' GANA'}
      </div>
      <div class="end-sub">${winner === 'EMPATE' ? 'Mismo puntaje — ¡juego parejo!' : `${winner} consiguió más patos`}</div>

      <div class="end-results" style="margin-bottom:24px;">
        <div class="end-result" style="border-right:1px solid rgba(255,255,255,0.08)">
          <div style="font-size:10px;letter-spacing:3px;color:#ffcc0288;margin-bottom:4px;font-weight:600">P1</div>
          <div class="end-result-val" style="color:#ffcc02">${p1.score}</div>
          <div class="end-result-label">Puntos</div>
        </div>
        <div class="end-result" style="border-right:1px solid rgba(255,255,255,0.08)">
          <div style="font-size:10px;letter-spacing:3px;color:#ffcc0288;margin-bottom:4px;font-weight:600">P1</div>
          <div class="end-result-val" style="color:#fff">${p1.kills}</div>
          <div class="end-result-label">Patos</div>
        </div>
        <div class="end-result" style="border-right:1px solid rgba(255,255,255,0.08)">
          <div style="font-size:10px;letter-spacing:3px;color:#44aaff88;margin-bottom:4px;font-weight:600">P2</div>
          <div class="end-result-val" style="color:#44aaff">${p2.score}</div>
          <div class="end-result-label">Puntos</div>
        </div>
        <div class="end-result">
          <div style="font-size:10px;letter-spacing:3px;color:#44aaff88;margin-bottom:4px;font-weight:600">P2</div>
          <div class="end-result-val" style="color:#fff">${p2.kills}</div>
          <div class="end-result-label">Patos</div>
        </div>
      </div>

      <button class="menu-cta" onclick="startCoop()">REVANCHA</button>
      <button class="btn" onclick="coopQuitToMenu()" style="margin-top:12px;font-size:13px;letter-spacing:4px;padding:11px 36px;">MENÚ PRINCIPAL</button>
    </div>
  `;
}

function coopQuitToMenu() {
  activeMode  = 'none';
  coopRunning = false;
  gun1.visible = false; gun2.visible = false;
  char1.visible = false; char2.visible = false;
  gunGroup.visible = true;
  document.getElementById('ui').style.display = 'flex';
  document.getElementById('progress-bar').style.display = 'block';
  document.getElementById('crosshair').style.display = 'block';
  for (const d of coopDucks) scene.remove(d);
  coopDucks.length = 0;
  document.getElementById('coop-hud').style.display = 'none';
  document.getElementById('coop-divider').style.display = 'none';
  document.getElementById('coop-timer').style.display = 'none';
  document.getElementById('ch-p1').style.display = 'none';
  document.getElementById('ch-p2').style.display = 'none';
  document.getElementById('pause-overlay').style.display = 'none';
  gamePaused = false;
  buildMainMenu();
}

// coop button uses onclick="startCoop()" — no static listener needed

</script>
</body>
</html>
